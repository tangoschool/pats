<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Philadelphia Argentine Tango School</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <!-- Fixed Header Navigation -->
  <header id="header">
    <div class="header-container">
      <!-- Hamburger Menu Toggle -->
      <div class="menu-toggle-wrapper" id="menu-toggle">
        <button class="menu-icon-button" aria-label="Toggle menu">
          <svg class="menu-icon" viewBox="0 0 24 24">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
          <span class="menu-label">MENU</span>
        </button>
      </div>

      <!-- Logo -->
      <div class="logo-container">
        <div id="logo-link">
          <!-- Logo SVG will be inserted by JavaScript -->
        </div>
      </div>

      <!-- Registration Button (hidden on mobile) -->
      <div class="header-button">
        <a href="https://philadelphiatangoschool.cowtinker.com/schedule" class="btn-register" target="_blank">
          REGISTER
        </a>
      </div>
    </div>
  </header>

  <!-- Mobile Drawer Menu -->
  <div id="menu-drawer" class="menu-drawer">
    <div class="menu-drawer-logo" id="drawer-logo">
      <!-- Logo will be inserted by JavaScript -->
    </div>
    <div class="menu-drawer-divider"></div>
    <nav>
      <ul id="mobile-menu-list">
        <!-- Menu items will be inserted by JavaScript -->
      </ul>
    </nav>
    <div class="menu-drawer-divider"></div>
    <div class="menu-drawer-button">
      <a href="https://philadelphiatangoschool.cowtinker.com/schedule" class="btn-register" target="_blank">
        REGISTER
      </a>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main-content" class="checkout-main">
    <section class="checkout-section">
      <div class="container checkout-container">
        <h1>Make a Payment</h1>

        <div id="checkout-message" class="message"></div>

        <form id="checkout-form" class="checkout-form">
          <div class="form-group">
            <label for="description">Description</label>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="What is this payment for?"
              required
            />
          </div>

          <div class="form-group">
            <label for="paymentAmount">Amount (USD)</label>
            <input
              type="number"
              id="paymentAmount"
              name="paymentAmount"
              placeholder="0.00"
              step="0.01"
              min="0.01"
              required
            />
          </div>

          <button type="submit" class="btn-primary btn-checkout">
            Proceed to Checkout
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer">
    <div class="footer-container">
      <div class="footer-content">
        <div class="footer-left">
          <div class="footer-logo">
            <!-- White logo SVG will be inserted by JavaScript -->
          </div>
          <div class="footer-company">
            <b>Philadelphia Argentine Tango School</b><br>
            2030 Frankford Avenue<br>
            Philadelphia, PA 19125<br>
            617-291-3798<br>
            meredithklein@gmail.com
          </div>
        </div>

        <div class="footer-right">
          <nav class="footer-menu">
            <ul id="footer-menu-list">
              <!-- Menu items will be inserted by JavaScript -->
            </ul>
          </nav>
        </div>
      </div>
      <div class="footer-copyright">
        Â© Meredith Klein 2018-<span id="footer-year"></span>. All rights reserved.
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/data.js"></script>
  <script src="/js/menu.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
