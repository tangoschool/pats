        <!-- Teasers Section -->
        
        <div id="page-teasers" data-teasers='[{"headline":"Mondays 7:30-9 pm","content":"# Andres & Meredith\n## Partners-Only Seminar\n\n__April 11-May 23 | In-studio & On Zoom\n7:30-9 pm__\n\n__Topic for the series:__\nChanges of Direction / Alteraciones\n\nChanges of direction, also called alteraciones, are some of the most under-utilized elements in tango, yet they are indispensable elements for creating a fluid, effortless dance.  We are excited to explore lots of lovely changes of directions and the steps that they make possible throughout April and May.\n\nSeries (in-person): $140/person\n\nSingle class pricing per person:\n$25/class - in-studio\n$15/class - online\n\nPartners-only\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1649633534/Mondays_April-May.jpg","localPath":"/images/Mondays_April-May.jpg","title":"Mondays_April-May","width":2000,"height":2000}},{"headline":"Wednesdays 7-8 pm","content":"# Andres & Meredith\n## Dance Floor Essentials\n\n__Starting March 9 | In-Studio\nIntermediate level & up__\n\nThis class covers lead-and-follow technique, personal movement technique, musicality and material that we find essential for the social dance floor. Examples of material covered include: giros, paradas, sacadas and adornos.  All students practice both roles.\n\nPartner-change class\n\n$20 per class or purchase a class card\n\n__Class card options:__\nFive 60-minute classes $95\nTen 60-minute classes $180\n\nPay for this class, and stay free for the beginner class that follows, and the milonga after that!","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1645309379/Wednesdays_7_o.jpg","localPath":"/images/Wednesdays_7_o.jpg","title":"Wednesdays_7_o","width":2000,"height":2000}},{"headline":"Wednesdays 8-9 pm","content":"# Andres & Meredith\n## Beginner Tango: Start Any Week!\n\n__Starting March 9 | In-studio\nBeginner Level & Up__\n\nAbsolute beginners welcome every week!!!\n\nPartner-change class\nAll students practice both roles\n\n$20 per class or purchase a class card\n\n__Class card options:__\nFive 60-minute classes $95\nTen 60-minute classes $180\n\n__This class is currently FREE for dancers under age 30.__  Having a diverse range of ages in the tango community is important.  The pandemic has prevented a whole generation of dancers from getting started.  If you are under age 30, and interested in taking this class, please send proof of age and your vaccine card to [meredithklein@gmail.com](mailto:meredithklein@gmail.com).\n\nPay for this class and stay free for the milonga (social dance) that follows.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1645309379/Wednesdays_at_8_pm.jpg","localPath":"/images/Wednesdays_at_8_pm.jpg","title":"Wednesdays_at_8_pm","width":2000,"height":2000}},{"headline":"Thursdays, November 11 & 18 at NOON","content":"# Diana Cruz\n## Resilient Body: In Shape through the Pandemic\n\n__Online__\n\n**NOTE** This class will take place from 12-1 pm on Thursday, November 11 and 18, while Diana is traveling in the UK/Europe. \n\nThe class that we all need right now.  A practical plan for at-home fitness and strength maintenance, created by [Diana Cruz](/diana-cruz), one of the greatest tango dancers, and a trained instructor of pilates, biotensegrity and other modalities.  You can take this class without any special props.  However, here is the [ideal prop list](https://www.cruzial.art/tangotensegrity).\n\nThis class is for individuals.  Diana truly offers options for all-levels. \n\nSingle class: $12 \n\n__Online Class Card Options:__\nFive Classes $55\nTen Classes $100\n\n*Photo: Marie-Dominique Verdier. www.MDVphoto.com*","videoUrl":"","linkText":"Read more about Diana...","link":"diana-cruz","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1636204580/Diana_Resilient_Body_Square_1.jpg","localPath":"/images/Diana_Resilient_Body_Square_1.jpg","title":"Diana_Resilient_Body_Square_1","width":2000,"height":2000}},{"headline":"Thursdays 7:10-8:10 pm","content":"# Teacher Varies Week to Week\n## Tango Technique\n\n__Online Class for individuals__\n\nDuring the pandemic, we have learned how convenient and excellent online classes can be for staying in \"tango shape\" and refining individual technique.  For that reason, we hope to keep a weekly online technique going as a regular part of our offerings.\n\nThis class will be taught by different teachers from week to week.  \n\nSingle class: $12 \n\n__Online Class Card Options:__\nFive Classes $55\nTen Classes $100","videoUrl":"","linkText":"","link":"Ines-Muzzopappa-and-Gaby-Mataloni","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1629937673/Tues_Tech_Square_Diana_1.png","localPath":"/images/Tues_Tech_Square_Diana_1.png","title":"Tues_Tech_Square_Diana_1","width":2000,"height":2000}},{"headline":"Fridays 5-6 pm","content":"# Carolyn Merritt\n## All-Levels Hatha Flow / Yin Yoga\n\n__Online__\n\nA breath-focused yoga class with a focus on the needs of tango dancers. This class is appropriate for all levels. Beginners are welcome.\n\nSingle class: $12 \n\n__Online Class Card Options:__\nFive Classes $55\nTen Classes $100\n\nPlease register for this class more than 24 hours in advance.  It will not take place when there is low attendance.  (You will be notified of any cancellations by email.)","videoUrl":"","linkText":"Read more about Carolyn...","link":"carolyn","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1629938036/Carolyn_Friday_Yoga_square_1.png","localPath":"/images/Carolyn_Friday_Yoga_square_1.png","title":"Carolyn_Friday_Yoga_square_1","width":2000,"height":2000}},{"headline":"Fridays 6:30-7:30 pm","content":"# Andres & Meredith\n## Int / Adv Partners Class\n\n__Online partners-only__\n\nVery happy to continue our online work with couples.  We&#39;ve been amazed at the progress our students have made on zoom and are excited to keep it up.\n\n$15 per person.","videoUrl":"","linkText":"","link":"andres","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1645310779/Fridays_Virtual.png","localPath":"/images/Fridays_Virtual.png","title":"Fridays_Virtual","width":2000,"height":2000}}]'>
