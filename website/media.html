:"","linkText":"Read the full piece","link":"https://www.instagram.com/p/C1CalioMtTB/","image":{"url":"/images/press-instagram-shopcats-photos.jpg","localPath":"/images/press-instagram-shopcats-photos.jpg","title":"press-instagram-shopcats-photos","width":1080,"height":1080}},{"headline":"It Takes Two (Hundred) to Tango...","content":"__(May 2023)__ \"Tango is spread throughout the world, you get that sense here. People from all over the world all taking part in the sensation, and that&#39;s what it&#39;s really about,\" said Jerry Klein. — 6abc","videoUrl":"","linkText":"Read the full piece","link":"https://6abc.com/tango-festival-2023-lithuanian-dance-hall-philadelphia-port-richmond-dancing/13320319/","image":{"url":"/images/press-6abc-tango-festival-2023.jpg","localPath":"/images/press-6abc-tango-festival-2023.jpg","title":"press-6abc-tango-festival-2023","width":1600,"height":900}},{"headline":"Tango Takeover","content":"__(June 2022)__ NBC Philadelphia&#39;s \"Philly Live\" covered our \"Tango Takeover\" of Comcast Plaza, and host Aunyea Lachelle learned her first tango steps.","videoUrl":"","linkText":"Watch the video","link":"https://youtu.be/bCNpPE0zbcM","image":{"url":"/images/press-youtube-tango-takeover.jpg","localPath":"/images/press-youtube-tango-takeover.jpg","title":"press-youtube-tango-takeover","width":480,"height":360}},{"headline":"YouTube Playlist of Tango Takeover Coverage","content":"__(May 2022)__ Thanks to the efforts of our PR team, Feldscher Horwitz Public Relations, every local network covered the \"Tango Takeover\" of Comcast Plaza on May 31, 2022.","videoUrl":"","linkText":"Watch the video","link":"https://youtube.com/playlist?list=PL-78bcT9uyzZ0Ob1HH3xDvfMXvTKFloAx","image":{"url":"/images/press-youtube-playlist-tango-takeover.jpg","localPath":"/images/press-youtube-playlist-tango-takeover.jpg","title":"press-youtube-playlist-tango-takeover","width":480,"height":360}},{"headline":"Beautiful Piece on What Tango Means to Dancers","content":"__(May 2022)__ ABC Philly Journalist Tom Kretschmer visited our Milonga Qilombo and produced this beautiful piece about what tango is and what it means to dancers","videoUrl":"","linkText":"Watch the video","link":"https://youtu.be/jcqt7QNhLKI","image":{"url":"/images/press-youtube-what-tango-means.jpg","localPath":"/images/press-youtube-what-tango-means.jpg","title":"press-youtube-what-tango-means","width":480,"height":360}},{"headline":"\"Passionate Pursuits\" Episode of WHYY&#39;s Movers and Makers","content":"__(April 2022)__ \"Experience the drama and passion of tango with pianist/composer Emiliano Messiez and dancer Meredith Klein.\" — WHYY","videoUrl":"","linkText":"Read the full piece","link":"https://whyy.org/episodes/passionate-pursuits/","image":{"url":"/images/press-whyy-movers-and-makers.png","localPath":"/images/press-whyy-movers-and-makers.png","title":"press-whyy-movers-and-makers","width":1329,"height":958}},{"headline":"Philadelphia Tango Festival Heats Up the City this Summer","content":"__(April 2022)__ \"There is a lot of pent-up desire to connect, to be together, to learn, and to enjoy listening to music and dancing, and the festival offers the perfect vehicle for the realization of all of these desires.\" — Metro Philadelphia","videoUrl":"","linkText":"Read the full piece","link":"https://metrophiladelphia.com/philadelphia-tango-festival-heats-up-the-city-this-summer/","image":{"url":"/images/PhiladelphiaFest_SQ_green2.jpg","localPath":"/images/PhiladelphiaFest_SQ_green2.jpg","title":"PhiladelphiaFest_SQ_green2","width":4500,"height":4500}},{"headline":"Philadelphia Argentine Tango School Goes Virtual","content":"__(August 2020)__ \"So I am confident that all of that equals a revival on the other side of all this.\" — PHL17","videoUrl":"","linkText":"Read the full piece","link":"https://phl17.com/web-exclusives/philadelphia-argentine-tango-school-goes-virtual/?fbclid=IwAR0cPjTL5kXyuWHEPhoZavLwTQFe8MIlDNziAQAB_8VP99G-QwrmV4rGE2s","image":{"url":"/images/press-phl17-goes-virtual.png","localPath":"/images/press-phl17-goes-virtual.png","title":"press-phl17-goes-virtual","width":1182,"height":632}},{"headline":"Embracing Uncertainty","content":"__(June 2020)__ \"Tango is imperfect and so am I. As time drags on and I reflect on its absence, its mysteries and its humanness loom large.\" — thINKingDance","videoUrl":"","linkText":"Read the full piece","link":"https://thinkingdance.net/articles/2020/06/26/34/Embracing-Uncertainty/","image":{"url":"/images/press-thinkingdance-embracing-uncertainty.jpg","localPath":"/images/press-thinkingdance-embracing-uncertainty.jpg","title":"press-thinkingdance-embracing-uncertainty","width":520,"height":240}},{"headline":"When Will We Dance Again?","content":"__(May 2020)__ \"Nothing is a substitute ... tango is in a different category.\" — thINKingDance","videoUrl":"","linkText":"Read the full piece","link":"https://thinkingdance.net/articles/2020/04/14/When-Will-We-Embrace-Again","image":{"url":"/images/press-thinkingdance-when-will-we-dance-again.jpg","localPath":"/images/press-thinkingdance-when-will-we-dance-again.jpg","title":"press-thinkingdance-when-will-we-dance-again","width":520,"height":240}},{"headline":"Performance & Interview on WRTI 90.1 FM","content":"__(September 2019)__ \"tango music and conversation with an ensemble of piano, bandoneon, and violin, recently recorded live in the WRTI Performance Studio.\" — WRTI","videoUrl":"","linkText":"Read the full piece","link":"https://www.wrti.org/post/wrti-901-performance-studio-tango-music-1918-present","image":{"url":"/images/press-wrti-performance-studio.jpg","localPath":"/images/press-wrti-performance-studio.jpg","title":"press-wrti-performance-studio","width":1200,"height":630}},{"headline":"Visit Philly filmed Meredith & Gustavo performing on the Art Museum Steps","content":"__(September 2019)__","videoUrl":"","linkText":"Read the full piece","link":"https://www.facebook.com/visitphilly/videos/1312731032238066/","image":{"url":"/images/press-visitphilly-art-museum-steps.jpg","localPath":"/images/press-visitphilly-art-museum-steps.jpg","title":"press-visitphilly-art-museum-steps","width":1080,"height":1350}},{"headline":"DanceUS.org","content":"\"The truth is that the festival started with a humor theme. I really felt that tango often took itself too seriously, and I wanted to lighten it up.\" — DanceUs.org (review of the 9th Philly Tango Fest, July 2019)","videoUrl":"","linkText":"Read the full piece","link":"https://www.danceus.org/argentine-tango/review-of-philly-tango-fest-and-interview-with-meredith-klein/","image":{"url":"/images/press-danceus-review-2019.jpg","localPath":"/images/press-danceus-review-2019.jpg","title":"press-danceus-review-2019","width":1920,"height":1080}},{"headline":"ThINKing Dance","content":"__(May 2019)__ \"The biggest highlight is the debut of Típica Messiez, a new tango orchestra that will play live at the Sunday evening milonga.\" — thINKingDance","videoUrl":"","linkText":"Read the full piece","link":"http://thinkingdance.net/articles/2019/05/14/Tangos-New-Golden-Age-Highlights-of-the-2019-Philadelphia-Tango-Fest","image":{"url":"/images/press-thinkingdance-golden-age-2019.jpg","localPath":"/images/press-thinkingdance-golden-age-2019.jpg","title":"press-thinkingdance-golden-age-2019","width":520,"height":240}},{"headline":"The top dance fitness classes around Philly","content":"__(March 2019)__ \"Melissa Magee tries Tango for the first time, while exploring one of the city&#39;s hottest new workout trends - dance fitness.\" — 6abc / FYI Philly","videoUrl":"","linkText":"Read the full piece","link":"https://6abc.com/health/fyi-spring-into-shape-special-/5196241/","image":{"url":"/images/press-6abc-dance-fitness-classes.jpg","localPath":"/images/press-6abc-dance-fitness-classes.jpg","title":"press-6abc-dance-fitness-classes","width":1600,"height":900}},{"headline":"Five Things You Should Know about Tango in Philly","content":"__(June 2018)__ Al Dia News","videoUrl":"","linkText":"Read the full piece","link":"https://aldianews.com/articles/culture/five-things-you-should-know-about-argentine-tango-philly/53086","image":{"url":"/images/press-aldianews-five-things-tango.jpg","localPath":"/images/press-aldianews-five-things-tango.jpg","title":"press-aldianews-five-things-tango","width":1131,"height":645}},{"headline":"An Emissary From the Golden Age of Tango","content":"__(June 2017)__ New York Times","videoUrl":"","linkText":"Read the full piece","link":"https://www.nytimes.com/2017/06/06/arts/dance/an-emissary-from-the-golden-age-of-tango.html","image":{"url":"/images/press-nytimes-emissary-golden-age.jpg","localPath":"/images/press-nytimes-emissary-golden-age.jpg","title":"press-nytimes-emissary-golden-age","width":1050,"height":550}},{"headline":"Let&#39;s Dance Tango, Philly!","content":"__(May 2017)__ \"I have had the opportunity to get to know tango communities around the world and that has helped me to realize that the success of a tango community lies in the commitment of its teachers. I always believed that developing a project like this was possible in Philadelphia,\" Klein recalled. — Al Dia News","videoUrl":"","linkText":"Read the full piece","link":"https://aldianews.com/articles/culture/let-s-dance-tango-philly/48295","image":{"url":"/images/press-aldianews-lets-dance-philly.jpg","localPath":"/images/press-aldianews-lets-dance-philly.jpg","title":"press-aldianews-lets-dance-philly","width":1131,"height":645}},{"headline":"At This Festival, It Takes Everybody to Tango","content":"__(May 2016)__ \"They call it a &#39;tango trance.&#39; It&#39;s the meditative state, like a runner&#39;s high, when tango dancers are listening to the music, improvising in sync with their partners, and feeling the energy of other dancers in the room.\" — Philadelphia Inquirer","videoUrl":"","linkText":"Read the full piece","link":"https://www.inquirer.com/philly/entertainment/20160519_Phila__Tango_Festival__Going_
