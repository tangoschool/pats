        <div id="page-teasers" data-teasers='[{"headline":"Wednesday, March 25: Leandro Benmergui","content":"**Buenos Aires History Lecture: From the Colonial Village to the Paris of South America**\n\nLearn about the origins of the city of Buenos Aires and the circumstances that caused it to become the major metropolis that gave birth to tango.  Given by Professor [Leandro Benmergui](https://www.purchase.edu/live/profiles/527-leandro-benmergui), Chair of the Latin American Studies Department at SUNY Purchase.\n\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1580143169/d87rishd6pcctjlcrn6q.jpg","localPath":"/images/d87rishd6pcctjlcrn6q.jpg","title":"d87rishd6pcctjlcrn6q","width":1080,"height":1080}},{"headline":"Wednesday, April 1: Emiliano Messiez","content":"**Tango Music: Why Do We Love It?**\nA demonstration/lecture by Composer/Pianist [Emiliano Messiez](https://www.emilianomessiez.com/).\nWednesday, April 1, 7:30-9:30 pm\n\n**BIO**\nBorn in Buenos Aires, Argentina, and based in NYC, pianist/composer Emiliano Messiez has become one of the most in-demand tango pianists in the country. He has played some of the countryâ€™s most notable music venues, including Lincoln Center, and performed with some of the worldâ€™s top musicians, such as Paquito de Rivera, Dino Saluzzi, and Concha Buika. With Jose Luis Infantino, he recorded an album, â€œSilencio,â€ in 2004 which received an UNESCO Prize for music.\n\nEmiliano graduated from the National University of the Arts in Buenos Aires. He later joined the faculty there, teaching in the Department of Composition. He also graduated from Berklee College of Musicâ€™s Escuela de Music ContemporÃ¡nea in Buenos Aires.\n\nHe is the creator of multiple shows, including â€œBarolo Tangoâ€ and â€œTango Dueling Pianos.\" Emiliano directs tango groups of all sizes, including the TÃ­pica Messiez, a complete tango orchestra based in New York City and sponsored by the Consulate General of Argentina. He is the composer of the new musical, Bordello, which is written by librettist Barbara Bellman.\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1585670052/sltq4uqohqstdzwaidmp.jpg","localPath":"/images/sltq4uqohqstdzwaidmp.jpg","title":"sltq4uqohqstdzwaidmp","width":1080,"height":1080}},{"headline":"Wednesday, April 8: Erin Malley & Doruk Golcu","content":"**A Deeper Look at Tango Videos: Tips and Tricks to Use Your YouTube Time Productively**\nA lecture by Dancers/Teachers Erin Malley & Doruk Golcu\nWednesday, April 8, 7:30-9:30 pm\n\nWe have all spent countless hours obsessing over tango performance videos - details of the feet, technique, and fabulousness. But now you can take that obsession to another level! Join Erin Malley and Doruk Golcu as they share with you how they watch tango videos (hint: not the feet), and the different layers of analysis involved as they do so. Get ready to nerd out, ramp up your video viewing game, and get more out of your viewing hours...since you might have a bit of extra time on your hands... ;)\n\n**BIO**\n[Erin Malley and Doruk Golcu](http://www.erinanddoruktango.com) are an internationally touring teaching couple. Based in west Michigan, their teaching prioritizes partnership, making the dance work as a collaborative team. They have taught and performed throughout the US, Europe and in Buenos Aires, Argentina. ","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1585853692/gcgidudulevyr9vlzc07.jpg","localPath":"/images/gcgidudulevyr9vlzc07.jpg","title":"gcgidudulevyr9vlzc07","width":1080,"height":1080}},{"headline":"Wednesday, April 15: Adam Hoopengardner","content":"**Tango DJing: Useful Advice for All DJs from Beginners to Experts**\nA lecture by Dancer/Organizer/DJ Adam Ashton Hoopengardner\nWednesday, April 15, 7:30-9:30 pm\n\nIn this lecture, we will cover:\n* Essential equipment for the DJ\n* Sound check advice\n* How to structure/ organize tandas ahead of time \n* Have a vision for the event you are running (When you are DJing you must behave as it you are running the event)\n* When to play what as the night progresses\n* Time Management. Not all events are the same length of time\n* Background of different orchestras\n* Get to know your audience\n* How to choose great cortinas\n* And much moreâ€¦\n\n**BIO**\n\nAdam Hoopengardner has been Djing for over 14 years.  He is very experienced at playing during the main event of a festival or marathon and really pushing the party energy up, but his specialty is playing during the slower times; final evenings, day time practicas, where he finds it more challenging to keep the energy going without forcing it.\n\nThere is a time and moment for each tanda and each cortina. It is important to try and feel the pulse of the room and what people want. One thing Adam does while he is DJing is ask certain people what music they want to hear, typically seeking out the higher level dancers in the room for feedback.\n\n â€œItâ€™s impossible to read the room without talking to people.â€\n\nAnother thing Adam does is dance while he is DJing, which helps him connect to the energy of the dance floor. The way people are dancing in the room, is the floor craft being respected, are people flying all over the place? This is something that is difficult to ascertain when one is sitting at a laptop playing music.\n\nAdam, with his dance partner Ciko Tanik, teach and run events in New York City, where they have contributed significantly to building the amazing NYC tango community.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1586658518/ivcvubimsiwsflcm94xx.jpg","localPath":"/images/ivcvubimsiwsflcm94xx.jpg","title":"ivcvubimsiwsflcm94xx","width":1080,"height":1080}},{"headline":"*Note new date*  Sunday, April 19: Matias Facio","content":"**Improvisation in Tango: How to Cultivate Greater Capacity for Innovation in the Mind and the Body**\nA lecture by Dancer/Teacher/Organizer Matias Facio\n**POSTPONED UNTIL Sunday, April 19** from 12 - 2 pm ET\n\n**BIO**\nMatias Facio first began dancing tango in Patagonia, Argentina, in 1995 and from that time has completely immersed himself in it. His passion for dancing and studying tango took him to Buenos Aires where he fully developed his own unique style, his dance. His mind and body awareness have been enriched through styles such as Graham, Limon, Cunningham, Flying Low and Feldenkrais. Matias has been teaching tango for more than 15 years, and traveling around the globe teaching and performing has given him a wealth of tango experiences.\n\nIn 2008 he moved to Berlin where he now lives. He teaches regularly with Claudia Rogowski, and travels teaching Tango around the world. Matias also collaborates with other dancers like Cynthia Fattori and Mariana Dragone. Check out his [website](http://www.matiasfacio.com) for more information about Matias.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1585667905/ovaceybc9tbrtw4at44b.jpg","localPath":"/images/ovaceybc9tbrtw4at44b.jpg","title":"ovaceybc9tbrtw4at44b","width":1080,"height":1080}},{"headline":"Wednesday, April 22: Flor Argento","content":"**Milongueros and the Culture of Transgression**\nA lecture by Buenos Aires-based Tango Dancer/Curator/Historian/Producer Flor Argento\nWednesday, April 22, 7:30-9:30 pm\n\nLearn about how the milongueros of the 1940s and 1950s invite us to transgress the limits of the genre and to look for our own tango in relation to these three elements: circulation in the dance floor, improvisation, and creativity.\n\n**BIO**\n\nFlor Argento is a professional dancer and tango teacher, curator and producer born in Buenos Aires in 1976. She studied History at the University of Buenos Aires (UBA). Director of Besos Brujos Tango School and teacher at Milonga Parakultural Salon Canning. She was part of the prestigious Ballet Escuela Aceta of Argentinaâ€™s Ministry of Culture in 2005.\n\n She performed and participated in shows in the main milongas of Buenos Aires and Europe together with great dancers of the golden age of tango like Tete Rusconi, Toto Faraldo and Flaco Dany, as well as with other dancers of her generation, including Jorge LladÃ³, Hernan Alvarez Prieto and Javier Maldonado.\n\n She is currently devoting herself to her two passions: dancingâ€”shows and performancesâ€”and teaching in the most renowned schools and milongas of Buenos Aires and the European circuit.\n\nIn 2018 she and Ignacio VÃ¡zquez inaugurated Last Tanda, an interactive exhibition of living heritage about the emblematic dancers of the golden age of tango (1940s and 1950s). In May/July 2020 she will go on her 19th tour in Europe (Austria, Belgium, France, Germany, Italy, Netherlands, Slovenia, and Spain).","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1587394336/kduijku6g3omt4igf69e.jpg","localPath":"/images/kduijku6g3omt4igf69e.jpg","title":"kduijku6g3omt4igf69e","width":1080,"height":1080}},{"headline":"Wednesday, April 29: Mitra Martin","content":"**Innovation: What Tango Dancers Can Learn From Worlds Beyond Tango**\nA lecture by Tango Dancer/Teacher & Researcher Mitra Martin\nWednesday, April 29: 7:30-9:30 pm\n\nA tour through a set of fascinating disciplines adjacent to the world of tango that can inform our work as dancers, teachers, DJs, and community organizers. Learn how these surprising, powerful, often hidden domains can enrich and deepen our partnerships and our communities. Learn why having the mindset of a researcher can take your tango practice to another level. \n\n[Mitra Martin](https://www.mitramartin.com/tango) has been exploring Argentine Tango continuously since encountering it in Buenos Aires in 1998. Her first Tango home was the Triangulo community in New York City directed by Carina Moeller which has influenced her work as a community organizer. She has also been influenced by Daniel Trenner&#39;s articulation of the relationship between roles in tango; Brigitta Winkler&#39;s approach to creating intentional learning experiences; Rodolfo Dinzel&#39;s approach to creating learning communities; and Gustavo Naveira&#39;s work on the structure of tango â€” but her most important learning has come from partnerships forged on the social dance floor, and interactions with learners.\n\nIn 2008 she co-founded Oxygen Tango in Los Angeles with Stefan Fabry and directed the school for nine years, facilitating thousands of hours of tango experiences for her community. Mitra co-created the Tango Challenge with Stefan Fabry in 2011, has facilitated twenty cohorts, and directed its expansion to new communities and facilitators. During this period Mitra also organized the Oxygen Milonga benefit which planted over 12,000 trees, published the Tango Manual video-based peer-learning beginner curriculum, and taught and DJ&#39;d at festivals and marathons all around the country. Mitra is an accomplished leader, follower, DJ, and organizer, and has nurtured a generation of Los Angeles-based dancers and DJs. She is a professional User Experience Researcher and a graduate of Princeton University with honors.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1586887132/b6mvci9h1opxr4sklela.jpg","localPath":"/images/b6mvci9h1opxr4sklela.jpg","title":"b6mvci9h1opxr4sklela","width":1080,"height":1080}},{"headline":"Sunday, May 3: Dr. Ian Frank","content":"**Tango in the Time of Covid-19: When Will We Dance Again?**\nA lecture by Dr. Ian Frank, Professor of Medicine at the Hospital of the University of Pennsylvania, and a leading Infectious Disease Specialist\nSunday, May 3, 7-9 pm\n\nDr. Ian Frank, one of the leading HIV/AIDS researchers worldwide, and a budding tango dancer, will present a lecture on the topic that is never far from *tangueros&#39;* minds right now: when and how will we be able to dance tango again?  Not only is Dr. Frank a leading epidemiologist, but he is one of the experts coordinating the University of Pennsylvania&#39;s Covid-19 vaccine trials, which should get under way this summer.\n\nSince the Question & Answer period will probably be very active, we will skip introductions today, so that we have more time at the end to answer your questions.  \n\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588026797/llf2z94mrfm5z4plxqov.jpg","localPath":"/images/llf2z94mrfm5z4plxqov.jpg","title":"llf2z94mrfm5z4plxqov","width":1080,"height":1080}},{"headline":"Wednesday, May 6: Flor Argento & Leandro Benmergui","content":"**Historical transformations in Buenos Aires Society, Culture and Dance as seen through Tango Lyrics**\nA lecture co-presented by two porteÃ±o historians, Flor Argento (based in Buenos Aires) and Leandro Benmergui (based in NYC)\nWednesday, May 6, 7:30-9:30 pm\n\nWhat can we learn about tango and Argentine society and culture through tango lyrics?  This lecture focuses on the history of tango lyrics from the late 19th century to the 1940s. We are going to explore the transformation of the lyrics in relation to the changes of tango and broader social and cultural issues. We will discuss the periodization of lyrics and their defining characteristics by looking also at immigration, class and gender relations, the development of the cultural industry and tango lyricsâ€™ place in Argentinaâ€™s intellectual field.\n\n**Flor Argento** is a professional dancer and tango teacher, curator and producer born in Buenos Aires in 1976. She studied History at the University of Buenos Aires (UBA). Director of Besos Brujos Tango School and teacher at Milonga Parakultural Salon Canning. She was part of the prestigious Ballet Escuela Aceta of Argentinaâ€™s Ministry of Culture in 2005.\n\n She performed and participated in shows in the main milongas of Buenos Aires and Europe together with great dancers of the golden age of tango like Tete Rusconi, Toto Faraldo and Flaco Dany, as well as with other dancers of her generation, including Jorge LladÃ³, Hernan Alvarez Prieto and Javier Maldonado.\n\n She is currently devoting herself to her two passions: dancingâ€”shows and performancesâ€”and teaching in the most renowned schools and milongas of Buenos Aires and the European circuit.\n \n In 2018 she and Ignacio VÃ¡zquez inaugurated Last Tanda, an interactive exhibition of living heritage about the emblematic dancers of the golden age of tango (1940s and 1950s). In May/July 2020 she will go on her 19th tour in Europe (Austria, Belgium, France, Germany, Italy, Netherlands, Slovenia, and Spain).\n \n **Leandro Benmergui** is chair of Latin American Studios at SUNY Purchase.  After completing a BA at the Universidad de Buenos Aires, Leandro moved to the U.S. to complete a PhD at the University of Maryland.  His work focuses on the social and cultural history of urban renewal and housing programs in Buenos Aires and Rio de Janeiro.  Leandro is in the process of being converted into a tango dancer.\n\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588606836/b5agoumikfosyb4ypf8o.jpg","localPath":"/images/b5agoumikfosyb4ypf8o.jpg","title":"b5agoumikfosyb4ypf8o","width":1080,"height":1080}},{"headline":"Wednesday, May 13: Bassem Youssef","content":"**The Unusual Life of an Average Tango Dancer**\nA lecture by Bassem Youssef\nWednesday, May 13, 7:30-9:30 pm ET\n\n**Bassem Youssef**, dubbed the Jon Stewart of the Arab World, was the host of popular TV show Al Bernameg â€“ which was the first of its kind political satire show in the Middle East. Originally a 5-minute show on YouTube, Al Bernameg became the first online to TV conversion in the Middle East and the most watched show across the region with 30 million viewers every week.  Al Bernameg received wide acclaim around the world with coverage in some of the biggest media outlets, topping it off with Youssefâ€™s appearance on the Daily Show with Jon Stewart twice in June 2012 and April 2013. In June 2013, Youssef hosted Jon Stewart on Al Bernameg in Cairo marking the second seasonâ€™s peak. \n\nThroughout its three seasons Al Bernameg remained controversial through its humorous yet bold criticism of the ruling powers, which led to tens of lawsuits being filed against the show and its host. Youssef was even issued an arrest warrant in March 2013 and turned himself in the next day where he was questioned for five hours and released on bail. The same year, Youssef was named â€œone of the 100 most influential people in the worldâ€ by Time Magazine. \n\nDuring its third season, the show achieved unprecedented weekly viewership ratings for 11 consecutive weeks. In June 2014, and after a six-week break, Al Bernameg team held a press conference where Youssef announced the termination of the show due to overwhelming pressures on both the show and the airing channel.\n\nIn the spring of 2015 Youssef served as a resident fellow at the Institute of Politics at the John F Kennedy School of Government for one semester. During his stay in the US he appeared twice as a Senior Middle East Correspondent on the Daily Show with Jon Stewart, commenting on the recent political situation in the region. In 2015 he hosted the International Emmy Awards gala of 2015, as well as the 49th Carthage Film Festival in Tunis. Youssef is also currently hosting a digital series titled â€œThe Democracy Handbookâ€ for Fusion Network, namely on its new digital platform F-Comedy. \n \nYoussef is the star of an internationally-renowned documentary by Sara Taksler entitled [Tickling Giants](https://www.amazon.com/Tickling-Giants-Bassem-Youssef/dp/B071HW5F4V/ref=sr_1_1?dchild=1&keywords=tickling+giants&qid=1586888405&sr=8-1) and author of [Revolution for Dummies: Laughing Through the Arab Spring](https://www.amazon.com/Revolution-Dummies-Laughing-Through-Spring/dp/0062446894).\n\nYoussef majored in cardiothoracic surgery, passed the United States Medical License Exam (USMLE) and is a member of the Royal College of Surgeons (MRCS). He practiced cardiothoracic surgery in Egypt for a period of 13 years before moving into comedy and political satirism.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588610237/upoijfkwwpj1jkaniuqz.jpg","localPath":"/images/upoijfkwwpj1jkaniuqz.jpg","title":"upoijfkwwpj1jkaniuqz","width":1080,"height":1080}},{"headline":"Virtual Tango Festival","content":"During the Virtual Tango Festival (May 22-25, 2020), we offered 9 different lectures on a range of topics relevant to tango.  Check out the amazing schedule [here](/virtual-tango-festival).","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588773179/iwmvxjzhro0p8xybu6lk.jpg","localPath":"/images/iwmvxjzhro0p8xybu6lk.jpg","title":"iwmvxjzhro0p8xybu6lk","width":1080,"height":1080}},{"headline":"Movie Night: Fermin and Q & A","content":"**Wednesday, June 3**\nPresentation of the movie \"Fermin,\" then interview with the director [Oliver Kolker](/Oliver-Kolker/bio)\n\nJoin us to watch a really wonderful movie, which takes place in a tango ambiance and features many people whom we know well in the tango community.  After the movie, we&#39;ll have a Q & A with the director, Oliver Kolker.\n\nWe will start the movie screening right at 7:30 pm, so please be on time.  The movie is just under 2 hours long, and then we&#39;ll have about 30 minutes of Q & A.  So this event will be slightly longer than our regular lectures.\n\nThe zoom link to join will now be in your emailed receipt.  Please look out for your receipt, which should arrive within 5 minutes of your purchase.\n\n[REGISTER NOW](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=5551d15e860e0000eecfe0201fac0000&partID=5551d15e870e0000eecfe0201fac0000&regOptionID=)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1590777651/js01g2ixfxfuehlcn7ic.png","localPath":"/images/js01g2ixfxfuehlcn7ic.jpg","title":"js01g2ixfxfuehlcn7ic","width":1080,"height":1080}},{"headline":"Wednesday, June 10 @ 7 pm: Korey Ireland ","content":"**Functional Harmony for Tango Dancers**\nA lecture in our Tango Music & Musicality series\nPresented by Korey Ireland\n\n**NOTE SPECIAL TIME: 7 pm**  Since Korey is joining us from Berlin, Germany, where it is six hours ahead, we will start 30 minutes early this week.  Huge thanks to Korey for offering a lecture at 1 am local time.  \n\nKorey Ireland has a special genius for taking seemingly opaque topics, like music theory, and making them easy-to-understand, fun, and RELEVANT. Join us on zoom this week to learn about functional harmony and how it can seriously help the musicality of the average tango dancer.\n\nIf you&#39;re coming, please take 16 minutes to [view the \"pre-show\" on youtube](https://www.youtube.com/watch?v=kdoLWWkka90).  Thanks!\n\n[Korey Ireland](http://www.tangomusicfordancers.com/) is a composer, bandoneonist, and tango dancer, living in Berlin, Germany. His passion for tango music and dance led him to form the first Community Tango Orchestra in Washington DC in 2009. In 2010 Korey moved to Berlin where he started the Berlin Community Tango Orchestra which performs regularly at milongas in Berlin and at tango festivals and special events around Germany. Korey has led tango orchestras at festivals in Buenos Aires, Boston, Washington DC, Los Angeles, Portland, Ashland, Devon, Moscow, Vancouver, Utrecht, Staufen, Proitzer MÃ¼hle, among others. In addition to arrangements for orquesta tipica, Korey also creates custom arrangements or adaptations for other instrumentation.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1591669237/usebfyysloaxzmchcgs1.png","localPath":"/images/usebfyysloaxzmchcgs1.jpg","title":"usebfyysloaxzmchcgs1","width":1080,"height":1080}},{"headline":"FREE Happy Hour: Wednesday, June 17","content":"This week&#39;s lecture had to be postponed.  In its place, we&#39;re going to hold a FREE Happy Hour.  \n\nWe&#39;ll be using breakout rooms to give you the chance to talk with different small groups of people throughout the event.  As you probably know, zoom does poorly with free discussion in big groups (too much noise competition), but great with small groups.\n\nA beloved bandoneonist will be stopping by to play music for us as well!\n\nPlease [sign up for free](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop) to get the link.  Hope you can join us!\n\n**Upcoming Lectures**\n6/24: Leandro Ragusa\n7/1: Sumire Hirotsuru","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1592338146/epeffgpldiv6j6u5jocy.jpg","localPath":"/images/epeffgpldiv6j6u5jocy.jpg","title":"epeffgpldiv6j6u5jocy","width":1080,"height":1080}},{"headline":"June 24: Leandro Ragusa","content":"**1900-1939: Tango in Paris. The Success of Tango in the Ville LumiÃ¨re.**\nWednesday, June 24, 7:30-9:30 pm\nBandoneonist and Tango History Professor [Leandro Ragusa](https://www.leandroragusa.com/)\n\nOutside of Buenos Aires and Montevideo, the city where tango&#39;s growth and popularity was greatest was Paris.  Before the Second World War, the tango music scene in Paris was significant and consequential for the history of tango as a genre.  Carlos Gardel&#39;s European debut, in Paris in 1928, is an important part of this story, and will be covered in the lecture as well.\n\n\n**Leandro Ragusa** studied bandoneÃ³n with the Mtros. NÃ©stor Marconi, Carlos Lazzari and Juan Carlos Caviello and composition & arrangements with Mtros. Gabriel Senanes, Laura Baade, Manolo Juarez an Diego Taranto. Leandro was awarded a scholarship by the Konex Foundation and completed the First Higher Diploma in Tango, graduating in 2004. He teaches in Tango history at the University of Tango in Buenos Aires. He is a co-founder of Centroâ€™feca (Forum of Argentine Cultural Studies), an NGO dedicated to the research and dissemination of Tango.\n\nLeandro has been part of various tango orchestras: Juan Dâ€™arienzo Orchestra, Rodolfo Mederos Orquesta, Orchestra Escuela de Tango. As a soloist he participated in the Tango show of the Huis Ten Bosh Center (Nagasaki-Japan), National Radio Youth Orchestra, the Orcheste Symphonique de Longueuil (Montreal - Canada) and the Symphony Orchestra of the Municipality of San MartÃ­n (Buenos Aires). Since 2016, he has made arrangements for different ensembles in the Argentina and abroad.\n\nHe currently performs as a bandoneonist, composer and arranger of â€˜Quinteto de Academiaâ€™, music for woodwinds and bandoneon, with which he has performed in New York, Boston and Montreal, as well as in Buenos Aires. In September 2019, WRTI Philadelphia filmed [this beautiful concert/profile](https://www.wrti.org/post/wrti-901-performance-studio-tango-music-1918-present) of Leandro Ragusa and Emiliano Messiez.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1592496009/q3itmtzlwjqfezlloahp.jpg","localPath":"/images/q3itmtzlwjqfezlloahp.jpg","title":"q3itmtzlwjqfezlloahp","width":1080,"height":1080}},{"headline":"July 1: Sumire Hirotsuru","content":"**Portrait of a Modern Violinist: An Evening with Tango & Classical Violinist, Best-Selling Author and Music Educator Sumire Hirotsuru**\nWednesday, July 1\n7:30-9:30 pm\n\nWe have gotten to know Sumire as one of the violinists of the [Tipica Messiez Tango Orchestra](https://www.emilianomessiez.com/tipica), but it&#39;s truly remarkable how many career paths she has pursued successfully and simultaneously.  A classical and tango violinist based in New York and performing worldwide, Sumire is also a best-selling author of three books on productivity in her native Japan.  She runs an education program for schoolchildren in her hometown every summer.  She graduated from Harvard University in 2016, and completed a Master of Music at The Julliard School in 2018.\n\nSumire&#39;s lecture will cover her upbringing in Japan, time-management tips as shared in her three books, and why it&#39;s key for a modern-day musician to pursue multiple career paths simultaneously.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1593191499/e37wry6iymrk4ihkbsnt.jpg","localPath":"/images/e37wry6iymrk4ihkbsnt.jpg","title":"e37wry6iymrk4ihkbsnt","width":1080,"height":1080}},{"headline":"July 8: Filmmaker Yael Szmulewicz","content":"**Presentation of the Documentary \"Amar Amando\" (\"Loving\") and Discussion with Filmmaker Yael Szmulewicz**\nWednesday, July 8\n7:30-8:40 pm: Documentary Screening\n8:40-9:30 pm: Q & A with Filmmaker Yael Szmulewicz\n**100% of payments for the July 8 lecture will be sent to Buenos Aires to be shared by Yael, Nidia & Juan.**\n\n**The movie**\nNidia had sung her whole life, while working as a school teacher for forty years and raising a family.  At age 80, she met tango singer/guitarrist Juan Villarreal and implored him to give her singing lessons.  Initially hesitant, Juan was captivated the first time he heard Nidia sing.  They started to perform together at tango clubs throughout Buenos Aires.  \n\nSometimes introduced as the \"Ambassador of Love,\" Nidia sings with the same intensity that she lives; she puts her personal mark on everything.  The film brings the audience into the unique and profound bond that Nidia and Juan share, which has enabled Nidia to discover the artistic personality living inside her, and which continues to glow more brightly every day, inspiring all of those who meet her and see her perform.\n\n**Festivals & Awards**\nFestival de Tango de Buenos Aires, 2018 (Buenos Aires)\n**First Prize, International Documentary**, Festival de cine de Maracaibo (Venezuela)\nFestival de Tango de Valencia, 2019 (Spain) \nFestival de Tango independiente â€œUrchasdonia 2018â€ (Buenos Aires)\nFestival de Tango â€œMilongas de carnaval 2019â€ (Buenos Aires)\n**SelecciÃ³n Oficial** de la muestra MICGENERO, 2019 (Mexico)\n**SelecciÃ³n Oficial** Festival Cineziq, 2020 (Argeles, Francia)\n**SelecciÃ³n Oficial** Festival Waco Famiily and Faith film festival, 2020 (Texas, USA)\n\n**Filmmaker Yael Szmulewicz**\nYael Szmulewicz is an audiovisual director, born in 1975 in Buenos Aires.  She studied Image and Sound Design at the University of Buenos Aires, where she taught as an assistant professor from 2001 to 2010.  Since 1996, she has worked extensively with a range of audiovisual projects, including documentaries, television series and feature films.  Since 2010, she has been working as a producer and director for music videos, concerts and tango festivals.  \"Amar Amando\" is her first full-length documentary.  She is currently developing two feature films.\n\nYou can support Yael&#39;s work, and the artists of this documentary, at [https://linktr.ee/yaelszmule](https://linktr.ee/yaelszmule).  100% of the revenue from this screening will go to support filmmaker Yael and performers Nidia and Juan.  So please [sign up](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=a2b2f45ea9040000cdb5e0201fac0000&partID=a2b2f45eaa040000cdb5e0201fac0000&regOptionID=#purchaseoptions) multiple times!  Haha!","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1593704208/kiyvtyv8umsr9nhaxi5c.jpg","localPath":"/images/kiyvtyv8umsr9nhaxi5c.jpg","title":"kiyvtyv8umsr9nhaxi5c","width":1080,"height":1080}},{"headline":"Wednesday, July 22: Jose GarÃ³folo","content":"**The Tango Betrayal: Clarifying, Researching and Looking for the Limits**\nWednesday, July 22\n7:30 pm New York Time\nPresented by **Jose GarÃ³folo**\n\nJose has presented variations of this talk throughout the world, from the NYU Center for Ballet and the Arts, to La Viruta in Buenos Aires, to the United Tango Festival, one of the first major online tango events.  \n\nThe talk provides an opening to think about the following questions:\n* What is the essence of tango social dancing?\n* When and why do we break the rules of social dancing in performance?\n* Are we really conveying the essence of tango, when we give a regular tango lesson?\n* Are we giving beginner students access to tango&#39;s roots?\n\nJose GarÃ³folo is a visual artist, tango dancer, teacher and choreographer.  He began learning tango in 1987, studying both with milongueros and with internationally-known tango stars.  In those same years he participated as a performer in plays at University of Buenos Aires tango ballet, speeches and street actions where dance and theater are key players in his creations.\n\nHe is currently President of the Civil Cambalache Association (since 2007) and directs the Cambalache Festival (since 2004). He works as a Tango teacher at the Faculty of Natural Sciences of the University of Buenos Aires (Since 1998). He participates in Troesmas research group dedicated to transmitting knowledge of teachers milongueros passed away.  He directs the Company Tragicomic Tanguera since 2011. He is an Artist of Vasari Gallery since 2007.  He lives in Buenos Aires Argentina and tours every year to USA (since 2016) with O1 visa.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1594752918/l78fojwdaxwwjjwpl3b0.jpg","localPath":"/images/l78fojwdaxwwjjwpl3b0.jpg","title":"l78fojwdaxwwjjwpl3b0","width":1080,"height":1080}},{"headline":"September 9: Experiences in the Life of a Milonguero","content":"## A Talk with Facundo Posadas\n\nFrom learning to dance *candombe* at age 3 to creating a show on African rhythm-based dances with Mikhail Baryshnikov at the Baryshnikov Auditorium in New York in 2007, Facundo Posadas has lived a unique and remarkable life in dance that has taken him to every corner of the world.  Just a month after his 80th birthday, we will be very honored to have him visit the Tango Lecture Series to share his experiences with us.\n\nThis lecture will be given in Spanish with live English translation by Gustavo Rember.\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=86c9465f93110000cdb5e0201fac0000&partID=86c9465f94110000cdb5e0201fac0000&regOptionID=#purchaseoptions)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1598473900/okxugfwxlvijz4kw07jc.jpg","localPath":"/images/okxugfwxlvijz4kw07jc.jpg","title":"okxugfwxlvijz4kw07jc","width":1080,"height":1080}},{"headline":"September 16: Non-violent Communication Methods for Tango and Life","content":"## Presented by Andrei Andreev\n\nIn this 90-minute lecture you will learn and try out practical skills to constructively observe, frame, and communicate your authentic emotions and needs. You will explore deeper self-care and honesty with yourself and all your relationships.\n\nThe lecture is followed by an optional 6-week practice program. Once a week you will practice with another learner to build your confidence in applying the new communication methods.  Our automated scheduling mechanism matches you up with a different program participant each week at a time that is convenient for you.\n\nAt the end of the program we will meet as a group one more time to share your progress and answer questions. The cost of the optional practice program and final meeting is $30.\n\nIf you have questions, you may contact Andrei Andreev at andreinla+nvc@gmail.com\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=07c4465f8d110000cdb5e0201fac0000&partID=07c4465f8e110000cdb5e0201fac0000&regOptionID=#purchaseoptions)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588773829/gyh23uyrwuairfbub9p6.jpg","localPath":"/images/gyh23uyrwuairfbub9p6.jpg","title":"gyh23uyrwuairfbub9p6","width":1080,"height":1080}},{"headline":"September 23: The Dawn of Tango - African Roots","content":"## Presented by Pierre Baston\n\nAn interactive discussion with images, music, video and text revealing the seminal (and surprising) Black contribution to tango music and dance.  From Argentina&#39;s 19th-century African *candombe* dance parties, to the milongas and *mundiales* (world tango championships) of today: see the connection, and learn about the long-concealed Black influences on the dance we love.\n\nPierre studied African history for a time as an undergraduate at Yale University, and earned a Masters Degree in Film Directing from the American Film Institute.  He has pursued his passion for tango in many visits to Argentina since 2001, and holds two certificates from the Masters Program of Escuela Argentina de Tango in Buenos Aires.  An inventor, Pierre has been awarded several patents in the U.S., Japan and Argentina for his innovative travel brewers for coffee, tea, and *mate*, Argentina&#39;s national drink.  Pierre teaches and organizes tango in his native Philadelphia.\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=10f5475fb2110000cdb5e0201fac0000&partID=10f5475fb3110000cdb5e0201fac0000&regOptionID=#purchaseoptions)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1598550929/eice16e2jpokjc68dxrn.jpg","localPath":"/images/eice16e2jpokjc68dxrn.jpg","title":"eice16e2jpokjc68dxrn","width":1080,"height":1080}},{"headline":"Tuesdays 8:15-9:30 pm","content":"# Emiliano Messiez: Tango Music Appreciation\n\nComposer and pianist [Emiliano Messiez](/emiliano) will offer a four-week workshop in which we will be investigating and discussing terms such as orchestration, arrangement, composition, harmony, rhythm, melody, accompaniment, phrasing and more, all of them related to tango and its relation to other music styles. Each class includes lecture, live and recorded musical examples and Q & A. This workshop will be useful for dancers, non-dancers, musicians, non-musicians.  No prior musical knowledge is needed.\n\nTuesdays, October 6-27\n\nThis class is for individuals.\n$15 single class / $50 for the series","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1601308255/pzqhljtrjoihtl5crezb.jpg","localPath":"/images/pzqhljtrjoihtl5crezb.jpg","title":"pzqhljtrjoihtl5crezb","width":1080,"height":1080}},{"headline":"October 14: LIGHTS, CAMERA, TANGO! â€“ and what we can learn from it\n","content":"## Presented by John Osburn\nIf tangoâ€™s had a movie career, itâ€™s had its ups and downs. Itâ€™s played leading roles and supporting parts, guest starred in cameos, been the extra in the background. Itâ€™s appeared as title, soundtrack, dramatic device, and signature scene. Itâ€™s been parodied, misunderstood, honored with documentaries, and granted a genre to call its own. During this talk, tango will reprise its many roles, from the Argentine tango film to Hollywood to the international cinema. It will entertain us in film clips, recall its hits and flops, illuminate its history, answer some awkward questions (or not), and speak to its place in our lives, as dance, music, and social event.\n\nJohn began dancing tango in 2008 and has sought out its history and culture ever since. In 2018, as a theater studies instructor at NYU, he taught a course looking at tango on stage and film from its origins to the present. He translates and recites tango lyrics for Milonga Falucho in New York (whattangomeans.com), was artist-in-residence with TangolandÃ³ at the Kimmel Center in Philadelphia, co-facilitated a workshop on tango and communication at the Cooper Union, participated in the Greater NYC Chapter of the Society for Neuroscienceâ€™s NeuroTango: Brainwaves in Sync?, and writes and translates for the Social Tango Project in Buenos Aires. John has a PhD in Performance Studies from NYU and has worked as a critic, editor, director, dramaturg, and professor.\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOneWorkshop&cartID=&workshopID=dd964b5fe0110000cdb5e0201fac0000&partID=dd964b5fe1110000cdb5e0201fac0000&regOptionID=#purchaseoptions)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1598789137/yxcw0sfw7nkkhc0f90jt.jpg","localPath":"/images/yxcw0sfw7nkkhc0f90jt.jpg","title":"yxcw0sfw7nkkhc0f90jt","width":1080,"height":1080}},{"headline":"October 21: Tango in the 1980s - Tracing the Resurgence of Tango","content":"## Presented by Olga Besio\nFor people who love tango, it&#39;s quite shocking to learn the extent to which the dance form nearly disappeared.  After falling out of favor in the late 1950s, the tango social dance community shrank for decades, until the military dictatorship (1976-1983) nearly quashed it completely.  One of the first things Andres Amarilla told me when we met was that, by the time he started dancing in 1987, there were probably only 100 people actively dancing tango in Buenos Aires.  One of them, and one who may have contributed more than anyone else to tango&#39;s return, is Olga Besio.\n\nTeacher, dancer, choreographer and dance company director, [Olga Besio](olga-besio) was part of a small group of young people at the University of Buenos Aires in the early 1980s studying Argentine folkloric dances.  Olga brought to the group the idea of adding tango to their repertoire, and initially, no one else liked the idea.  However, Olga kept advocating for tango, and slowly a few more members of the group took it up.  From that moment until today, Olga has never stopped working on the project to bring tango back. She initiated huge numbers of porteÃ±os to tango by organizing a free course at the San Martin Cultural Center, has been named an Honorary Member by the National Academy of Tango, and was distinguished with an \"Ambassador of Tango\" award by UNESCO.  In short, without Olga&#39;s efforts, the global tango community would likely not be what it is today.  All of us who dance tango around the world owe her a great debt.\n\nPlease join us on Wednesday, October 21 to hear about the resurgence of tango from Olga&#39;s perspective.  Given that tango will need another resurgence after the \"tango pause\" caused by Covid, this story is particularly timely and important.\n\nThe lecture will be presented in Spanish, with English translation by Meredith Klein.\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&searchText=olga&offerTypeFilter=Drop%20In%20Class,Workshop)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1602084829/oydpb4bxfnfuqlggsuxb.jpg","localPath":"/images/oydpb4bxfnfuqlggsuxb.jpg","title":"oydpb4bxfnfuqlggsuxb","width":1080,"height":1080}},{"headline":"November 18: Lead and Follow in the Workplace","content":"## Presented by Sharna Fabiano\n\nTango dancers are deep explorers of relationship and communication, understanding teamwork at the creative synergy between two roles: lead and follow. In the professional world, however, the conversation skews heavily toward leadership. Followership is typically dismissed as irrelevant or unwanted. Is it any wonder, then, that employers struggle with chronic disengagement, resistance, miscommunication, and churn, especially among younger workers? \n\nThis presentation uses insights and wisdom from tango to introduce the idea of strong followership into the workplace context, in order to make professional relationships more productive and equitable. Even if you hold a â€œleadershipâ€ title, you most likely report to someone else. In a work environment, followership skills are relevant for everyone.\n\nIn addition to a short lecture on how lead and follow operate in the workplace, the session will include three interactive exercises conducted in break-out rooms, guided discussion, and Q&A.\n\n**Sharna Fabiano** has over 20 years of experience teaching and organizing in the tango community. She has directed two tango schools, toured internationally, and performed with TangoMujer, the first all-women tango company in the world. She also has an MFA in Dance and is a certified yoga teacher and empowerment coach. She now works with professionals seeking to develop their careers in ways that are meaningful and satisfying. Her forthcoming book, Lead & Follow, lays out a 9-week coaching curriculum that uses tango principles - in particular followership skills - to strengthen work place communication. Learn more about Sharnaâ€™s work at [https://www.sharnafabiano.com](https://www.sharnafabiano.com).\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&searchText=sharna&offerTypeFilter=Drop%20In%20Class,Workshop)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1605229015/nucntxmfkpg3eucb2wcw.jpg","localPath":"/images/nucntxmfkpg3eucb2wcw.jpg","title":"nucntxmfkpg3eucb2wcw","width":1080,"height":1080}},{"headline":"December 2: Tango Lyrics","content":"Who wrote the tangos we dance to? Why were they written, and what are they about? Join us for this exploration of tango lyrics with poetry translator [Jake Spatz](http://tangodc.com/#emtc), and learn about the origins of your favorite songs. \n\nJakeâ€™s translations follow the original forms and melodies, offering a trusty tour through the meanings of the songs. Weâ€™ll cover dance-floor favorites like \"Malena\" and \"Tinta Roja,\" and learn how the songs evolved from the roaring &#39;20s to the turbulent &#39;30s and into the romantic style of the &#39;40s---and we&#39;ll explore how songs \"talk to each other\" across decades.\n\nJake Spatz, teacher, DJ, and host of the Eastern Market milonga in DC, has been translating tango lyrics since 2005. He now collaborates with the weekly program \"Bienvenido al Tango\" on WOWD-LP in Takoma Park, Maryland. The first volume of his tango translations Librotango includes 26 songs in singable English versions (available in paperback on Amazon.com).\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&searchText=jake&offerTypeFilter=Drop%20In%20Class,Workshop)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1605628653/ygkqkcdzcfzntt8luctl.jpg","localPath":"/images/ygkqkcdzcfzntt8luctl.jpg","title":"ygkqkcdzcfzntt8luctl","width":1080,"height":1080}},{"headline":"December 9: The Tango Guitar Tradition","content":"Considered the national instrument of Argentina, the guitar is used throughout the country in a wide variety of styles. However, it is not common to hear guitar music inside the milongas. In this lecture, Patricio Crom and Juan Villarreal will guide us through the history of tango guitar and the various styles of playing  inside this genre.\n\n**Editorial comment from Meredith**: The music that Juan & Patricio make together is so insanely beautiful that it will cure whatever ails you.  Check them out on [itunes](https://music.apple.com/WebObjects/MZStore.woa/wa/viewCollaboration?cc=us&ids=20455850-1147470507) or [spotify](https://open.spotify.com/artist/255PecelViayzHRWT9aIPD) before the lecture.\n\n**BIOS**\nBorn in Buenos Aires, **Patricio Crom** is an arranger, composer, and guitarist of Argentine music. He studied tango guitar at the Academia Nacional del Tango with maestro Anibal Arias. Patricio has recorded several albums, as well performed throughout South America, Europe, and Asia. In 2020, Patricio will release his fourth album with singer Juan Villarreal titled D arienzo en Guitarras. In addition to his musical activities, he is an accomplished puppeteer, a collector of antique Argentine guitars, and is preparing a documentary film on tango guitar.\n\nSinger, guitarist and composer, **Juan Villarreal** was born in Puerto San Julian, Patagonia Argentina.  He actively participates in different musical projects such as Orquesta El Arranque, Duo Villarreal Crom, Nidia y su Banda, El Muro Tango and Cruces del Plata.  He has recorded several albums and performed concerts throughout America and Europe.  In 2020, he will present a new album with guitarist Patricio Crom in tribute to Juan Darienzo called \"D&#39;Arienzo en guitarras\".  In 2021, he will present the album \"Camaradas\"  with Orquesta El Arranque and Maestro Victor LavallÃ©n, historical bandoneonist in Osvaldo Pugliese&#39;s orchestra.\n\n[REGISTER](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&searchText=guitar&offerTypeFilter=Drop%20In%20Class,Workshop)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1605629449/mdqhruyardpsvxsyv1oo.jpg","localPath":"/images/mdqhruyardpsvxsyv1oo.jpg","title":"mdqhruyardpsvxsyv1oo","width":1080,"height":1080}},{"headline":"TanGoldberg Concert feat. Lidia Borda","content":"## Wednesday, January 13\nCONCERT, followed by Q & A\n7:30 pm-9:15 pm New York Time\n\nWe are very happy to bring you a concert from the TanGoldberg Series, recorded at the Oliverio Cultural Center in Buenos Aires.  The concert features singer **LIDIA BORDA** with whom we will enjoy a Q & A after the concert.\n\nLidia is joined by truly some of the greatest tango musicians alive:\n**Horacio Romo**, bandoneon & musical direction\n**Analia Goldberg**, piano & producer\n**Daniel Falasca**, bass\n**Pablo Agri**, violin\n\nThe event will take place in two sections:\n* **7:30-8:30 pm:** Watch / listen to concert on VIMEO (amazing sound/video)\n* **8:30-9:00 pm:** Meet on Zoom for the Q & A \n\nRegistrants will receive both links.\n\n**Cost:**\n$15 (Second registrant in household pays $5)\nIf the cost is a hardship, please [email](mailto:meredithklein@gmail.com) for free entrance or paypal any amount using the link below.\n\n[REGISTER ON OUR REGISTRATION SITE](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop)\nor\n[PAYPAL](https://www.paypal.com/paypalme/philadelphiatango) with a note about which event you are registering for","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1610330390/vq1o6epboyybrl4fxw7t.png","localPath":"/images/vq1o6epboyybrl4fxw7t.jpg","title":"vq1o6epboyybrl4fxw7t","width":1080,"height":1080}},{"headline":"January 2021: The Beginning of the End of the Covid-19 Pandemic","content":"## Wednesday, January 20\nFREE LECTURE by Dr. Ian Frank , followed by Q & A\n7:30 pm-9:30 pm New York Time\n\nThe pandemic has obviously hit tango really hard.  One of the bright lights of the past year has been the fortuitous presence in our tango community of **Dr. Ian Frank**, Professor of Medicine at the Hospital of the University of Pennsylvania, and a leading Infectious Disease Specialist.  He is the lead researcher overseeing the late-stage vaccine trial for the Janssen vaccine at the University of Pennsylvania.  He is also a budding tango dancer.\n\nDr. Frank gave a lecture early in the pandemic which was instrumental in helping many of us figure out how to keep ourselves safe. I am so happy to welcome him back to give another lecture on Wednesday, January 20.  Dr. Frank did indeed choose the hopeful title for this lecture:  \"January 2021: The Beginning of the End of the Covid-19 Pandemic.\" \n\nWe are making this lecture free as a public service.  Registration is required, however, so we can make sure we have enough Zoom capacity, and also get you your link by private message.\n\n[REGISTER NOW](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1610382169/j7xee4xuthctqb8wrhhh.png","localPath":"/images/j7xee4xuthctqb8wrhhh.jpg","title":"j7xee4xuthctqb8wrhhh","width":1080,"height":1080}},{"headline":"TanGoldberg Concert + ","content":"## Friday, January 22\nThis event has been rescheduled for Friday, January 22.  Hope you can join us!\n\n### CONCERT FROM THE TANGOLDBERG SERIES\n\n**Horacio Romo**, bandoneon & musical direction\n**Analia Goldberg**, piano & producer\n**Daniel Falasca**, bass\n**Pablo Agri**, violin\n**Chino Laborde**, vocals\n\n### CHAT WITH THE PRODUCERS\n\n**Yael Szmulewicz** (filmography)\n**Analia Goldberg** (series host)\n\nThe event takes place in two parts: \n**7:30-8:15 pm:** Watch / listen to concert on VIMEO (much better sound & video quality)\n**8:15-9:00 pm:** Meet on Zoom for the Q & A\n\n**Cost:**\n$15 (Second registrant in household pays $5)\nIf the cost is a hardship, please [email](mailto:meredithklein@gmail.com) for free entrance or paypal any amount using the link below.\n\n[REGISTER ON OUR REGISTRATION SITE](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop)\nor\n[PAYPAL](https://www.paypal.com/paypalme/philadelphiatango) with a note about which event you are registering for","videoUrl":"","linkText":"","link":"zoom-lectures-past","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1610845344/g2wydqokzmhdiyyiqrxx.jpg","localPath":"/images/g2wydqokzmhdiyyiqrxx.jpg","title":"g2wydqokzmhdiyyiqrxx","width":1080,"height":1080}},{"headline":"Premiere of a New Documentary on the History of Tango Music: \"Tango in Three Centuries\"","content":"## Wednesday, January 27\nDOCUMENTARY PREMIERE , followed by Q & A\n7:30 pm-9:00 pm New York Time\n\n**Tango in Three Centuries: From Its Origins through the Present Day | Episode 1: Tango&#39;s Origins to 1920**\nIn Spanish, with English subtitles\n\nThis is the first in a series of documentaries, structured as conversations between Composer / Bandoneonist Leandro Ragusa & Music Historian Omar Garcia Brunelli.  It was produced during the pandemic with support from the Philadelphia Argentine Tango School, and our donors.\n\nThe video portion will take place on Vimeo.  Then we will move to Zoom for live interaction.  This event will be recorded and made available after-the-fact to those unable to attend on Jan. 27.\n\nCost:\n$15 (Second registrant in household pays $5)\nIf the cost is a hardship, please email for free entrance or paypal any amount using the link below.\n\n[REGISTER ON OUR OLD REGISTRATION SITE](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop)\nor\n[REGISTER ON OUR NEW REGISTRATION SITE](/registration)\nor\n[PAYPAL](https://www.paypal.com/paypalme/philadelphiatango) with a note about which event you are registering for.\n\nWe are actively soliciting donations to help produce the second video in the series, which will cover tango&#39;s development from 1920 through 1935.\n\n","videoUrl":"","linkText":"","link":"about","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1610470318/es84pj5zpjx4xazmyunb.jpg","localPath":"/images/es84pj5zpjx4xazmyunb.jpg","title":"es84pj5zpjx4xazmyunb","width":1080,"height":1080}},{"headline":"Building/Rehabilitating A Community: Tips, Tricks & Mistakes from the Tango Front Lines","content":"## Wednesday, February 3\nPresented by Alberto Ramos Cordero, co-founder of the Cleveland Tango School\n\n7:30 pm-9:00 pm New York Time\nLecture and Q & A\n\n","videoUrl":"","linkText":"REGISTER","link":"registration","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1611602918/mn1axarvktk2xsunouif.png","localPath":"/images/mn1axarvktk2xsunouif.jpg","title":"mn1axarvktk2xsunouif","width":1080,"height":1080}},{"headline":"Tango & Anti-Racism Efforts: Building A More Equitable Tango Community","content":"## Wednesday, February 10\n7:30 pm-9:00 pm New York Time\n\n**Event description in the words of the lead presenter, Sharna Fabiano:** What does the phrase \"tango communityâ€ mean to you? This is one of the many questions, I asked a small group of teachers and organizers on a Zoom call last summer, inspired by the powerful civil demonstrations led by the Movement for Black Lives. Since then, our Anti-racist Tango Organizing (ATO) group has met monthly during the quarantine period to examine how white supremacy manifests in our tango experiences, and to develop concrete strategies for designing more racially equitable and inclusive tango events. This session shares some of what weâ€™ve learned so far on those calls and what weâ€™re planning in 2021, and includes a short interactive exercise in small groups to support you in thinking about this topic in your home community.\n\nLed by Sharna Fabiano and the ATO organizing council: Misha Agunos, Elly Fernandez, Erin Malley, and Magan Wiles\n\n*100% of revenues from this event will be donated to the Movement for Black Lives.*","videoUrl":"","linkText":"REGISTER","link":"registration","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1611605357/fwjji8zimxlanquzeyhf.jpg","localPath":"/images/fwjji8zimxlanquzeyhf.jpg","title":"fwjji8zimxlanquzeyhf","width":1080,"height":1080}},{"headline":"Introduction to Restorative Justice: What, How, When, Why for our Tango Community","content":"## Wednesday, February 17\n7:30 pm-9:00 pm New York Time\n\nPresented by Gretchen Casey of the [Amend Initiative](https://amendinitiative.org/) and [Mitra Martin](https://www.mitramartin.com/tango)\n\nRestorative Justice (RJ) provides a means of addressing both everyday conflicts and serious harms in a way that offers the possibility of healing and growth for all involved.  As we look toward a re-launch of tango after the pandemic, we think that RJ may prove to be an essential tool, both for addressing issues from the past, and issues that will inevitably emerge in the future.\n\n**Gretchen Casey** provides facilitation and training on utilizing and incorporating restorative justice approaches in criminal and community case referrals involving serious harm. For over 34 years Gretchen has been an advocate and counselor for victims of crime in Gainesville, FL. Gretchen is also the creator of AmendInitiative.org and the facebook platform page Unshame which posts supportive messages for survivors of sexual assault.  She believes that our lives are defined by what we are paying attention to and that restorative justice is a means to offer healing, increased understanding, and accountability in ways that are safe, voluntary, and effective. \n\nGretchen received her BA in Urban Studies from the University of Florida and has studied, practiced, and offered Morita therapy principles for the past 25 years. \n\n**Mitra Martin** has been exploring Argentine Tango continuously since encountering it in Buenos Aires in 1998.  In 2008 she co-founded Oxygen Tango in Los Angeles with Stefan Fabry and directed the school for nine years. Mitra co-created the Tango Challenge with Stefan Fabry in 2011, has facilitated twenty cohorts, and directed its expansion to new communities and facilitators. During this period Mitra also developed the Tango Lexicon tango notation system with David Lampson, served as an advisor to the Caltech Tango Club, organized the Oxygen Milonga benefit which planted over 12,000 trees, published the Tango Manual video-based peer-learning beginner curriculum, and taught and DJ&#39;d at festivals and marathons all over the U.S. Mitra is an accomplished leader, follower, DJ, and organizer, and has nurtured a generation of Los Angeles-based dancers, organizers, and DJs.  Today, her core interest is in prototyping new social and educational formats for tango that allow for people to more consistently experience connection with themselves, one another, and the larger community.\n\n[REGISTER](/registration)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1613324427/Lecture_2-17-21_Square.jpg","localPath":"/images/Lecture_2-17-21_Square.jpg","title":"Lecture_2-17-21_Square","width":1080,"height":1080}},{"headline":"The Way Back to Tango: Reclaiming Our Connections & Building New Ones","content":"## Wednesday, February 24\n7:30 pm-9:00 pm New York Time\n\nPresented by Andrei Andreev\n\nLooking toward the future of tango, it&#39;s not just public health concerns that threaten the ability of communities to come back together.  Political divisions, which are exacerbated by social media, have also been a strain on the fabric of tango communities.  With differences laid so bare, many tangueros are concerned about how their community can regain a sense of togetherness and joy post-pandemic.\n\nFrom his background as a Nonviolent Communication practitioner and educator, Andrei Andreev will help us develop resources to reconnect with what tango gives us and what we as unique individuals bring to tango.  This awareness can help us recreate pathways to connection, even with those whose world view differs greatly from our own. \n\n__Andrei Andreev__ is a Nonviolent Communication trainer, whose work facilitates building practical skills and shifts in awareness supporting healthy, empowered relationships with others and with oneself. He works with individuals, couples, families and organizations with focus on embodiment and simplicity.\n\nAndrei has taught in the U.S. and Europe, in workshops, families, and one-on-one. He has been training and practicing NVC since 2007 and is certified as a Nonviolent Parenting Educator.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1613347877/Lecture_2-24-21_Square.png","localPath":"/images/Lecture_2-24-21_Square.png","title":"Lecture_2-24-21_Square","width":1080,"height":1080}},{"headline":"The Seasons: A Dance Film from Parasol Arts","content":"## Wednesday, March 3\nThis is the first in a series of five events, celebrating the Centennial of Astor Piazzolla.\n\n**7:30-8:30 pm:** \"The Seasons\" airs on Vimeo\n**8:30-9 pm:** Conversation with Creative Director Lorita Travaglia, filmmaker Mitch Dickman, and the Dancers\n\nOriginally planned for the stage in September 2020, **â€œThe Seasonsâ€** is a story about the cycles of the universe, the planet, human lives and relationships. The setting is an art gallery on a Saturday night where a few tango couples have gathered to dance, and some people enter to look at the artwork. Three strangers, inspired by the paintings depicting the seasons of nature, imagine different seasons of romantic relationships.\n\nAward winning filmmaker, Mitch Dickman of Listen Productions worked closely with Parasol Artsâ€™ Creative Director, Lorita Travaglia to build an artistic dance film which contrasts the macrocosm of the universe and the microcosm of the intimacy of human relationships.\n\nWorld class Argentine Tango stars, Diana Cruz and Donato Juarez, who starred in Parasol Artsâ€™ last production â€œCarmen the Tangoâ€ are joined by Domenico Luciano former principal dancer with Colorado Ballet, in this unique look at the seasons of human connection.\n\nThe show incorporates the artwork of Michelle Courier of Denverâ€™s Westward Gallery, Astor Piazzollaâ€™s â€œThe Four Seasons of Buenos Ariesâ€ played by The Austin Piazzolla Quintet and the poetry of Vivaldi as the setting for the dance.","videoUrl":"","linkText":"Read more about the artists","link":"the-seasons-bios","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1614007229/Lecture_3-3-21_The_Seasons_Square_1.png","localPath":"/images/Lecture_3-3-21_The_Seasons_Square_1.png","title":"Lecture_3-3-21_The_Seasons_Square_1","width":2000,"height":2000}},{"headline":"Astor Piazzolla Panorama: A journey through his life and works","content":"## Wednesday, March 10\nThis is the second in a series of five events, celebrating the Centennial of Astor Piazzolla.\n\n7:30 pm-9:00 pm New York Time\n\nPresented by Federico Diaz\n\nBorn in Mendoza, Argentina, __Federico DÃ­az__ is an up-and-coming versatile musician of the new generation of guitarists with a multi-faceted career as a performing artist, arranger and composer in the Classical and Argentinian music worlds. His performances have taken him to distinguished festivals and concert halls across the US, Europe and Latin America. His passion for chamber music lead him to collaborate with musicians such as Lionel Cottet, Daniel Binelli, Juan FalÃº, Bruno Cavallaro, Juan Pablo Navarro, among others. He has recorded for Sony Classical and Epsa Music. Federico studied at prestigious institutions such as National University of Cuyo, University Mozarteum Salzburg, Hochschule fÃ¼r Musik Hanns Eisler, and Manhattan School of Music. His former teachers include Eliot Fisk, Ricardo GallÃ©n and David Starobin. Currently, he is finishing a DoctorÂ´s Degree in Performance, at the GraduateCenter of City University of New York, under the guidance of Frederic Hand.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1614007422/Lecture_3-10-21_Square.png","localPath":"/images/Lecture_3-10-21_Square.png","title":"Lecture_3-10-21_Square","width":1080,"height":1080}},{"headline":"Bailando Piazzolla","content":"## Wednesday, March 17\nThis is the third in a series of five events, celebrating the Centennial of Astor Piazzolla.\n\n7:30 pm-9:00 pm New York Time\n\nPresented by [Emiliano Messiez](/emiliano)\n\nIn this lecture, we will analyze compositions by Astor Piazzolla in a very approachable way.  We&#39;ll try to understand why the music of one of the most important tango composers is not often danced. Through videos, recordings, sheet music and live examples, weâ€™ll discuss his use of compositional tools, instrumentation, structure, types of accompaniment and more.  We&#39;ll look at all of these aspects comparing his â€˜New Tangoâ€™ with tango from the Golden Age, in which Piazzolla also played an important role.\n\nWhy is Piazzolla&#39;s music not played very much in milongas? Can we bring Piazzolla to the dance floor? Weâ€™ll discuss, analyze and investigate together. No musical or dance knowledge is needed for this lecture.\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1614009143/Lecture_3-17-21_square_1.png","localPath":"/images/Lecture_3-17-21_square_1.png","title":"Lecture_3-17-21_square_1","width":2000,"height":2000}},{"headline":"B Side: The Unknown Face of Piazzolla","content":"## Wednesday, March 24\nThis is the fourth in a series of five events, celebrating the Centennial of Astor Piazzolla.\n\n7:30 pm-9:00 pm New York Time\n\nA Conversation between Leandro Ragusa & Omar Garcia Brunelli","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1614015682/Lecture_3-24-21_Square.png","localPath":"/images/Lecture_3-24-21_Square.png","title":"Lecture_3-24-21_Square","width":2000,"height":2000}},{"headline":"Concert by Quinteto Revolucionario & Conversation with the Band","content":"## Wednesday, March 31\nThis is the fifth in a series of five events, celebrating the Centennial of Astor Piazzolla.\n\n7:30 pm-9:00 pm New York Time\n\nThis concert is part of the album release celebrations accompanying the launch of the Quinteto Revolucionario&#39;s â€œ100 aÃ±os.\"  [Purchase](https://ffm.to/quintetorevolucionario100)\n\nThe Quinteto Revolucionario is made up of five of the most recognized contemporary tango musicians, all specialists in performing the music of Astor Piazzolla.  All have been part of the Astor Piazzolla Foundation official quintet, with which they won a 2019 Latin Grammy Award for Best Tango Album.  They founded the Quinteto Revolucionario to continue bringing Astor Piazzollaâ€™s artistic legacy to the world.  They also seek to preserve the legacies of the musicians who played with Piazzolla, as they recognize that all of his band members contributed significantly to creating the Piazzolla musical style, which forever changed tango.\n\nOne of the defining features of Piazzollaâ€™s bands and recordings, from the orchestra he founded in 1946, to his last sextet in 1969, is that he always worked with musicians of the absolute highest caliber.  The five members of Quinteto Revolucionario have been working for thirty years to embody and keep alive this demanding interpretive tradition.\n\nThe Quinteto Revolucionario released its first album, [100 aÃ±os](https://ffm.to/quintetorevolucionario100), on March 5, 2021, a few days before the Astor Piazzolla Centennial.  (Astor Piazzolla was born on March 11, 1921.)  The definitive tribute to Piazzolla, the album was recorded at Fort Studios in Buenos Aires with master sound engineers â€œEl Portuguesâ€ Jorge Da Silva and Javier Mazzarol.  The quintet was joined by a legendary guitarist who performed with Piazzolla, and representative of living history, Horacio Malvicino.\n\nThe musicians of Quinteto Revolucionario are: Esteban Falabella (Guitar), Lautaro Greco (BandoneÃ³n), SebastiÃ¡n Prusak (Violin), Sergio Rivas (Double Bass) and Cristian ZÃ¡rate (piano).\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1614651719/Lecture-Concert_3-31-21.png","localPath":"/images/Lecture-Concert_3-31-21.png","title":"Lecture-Concert_3-31-21","width":2000,"height":2000}},{"headline":"V-REAL Sessions: April 28 event will start early at 7 pm!","content":"__NOTE:__ We will start the lecture at 7 pm this week, Wednesday, April 28, so it finishes before Biden&#39;s address to Congress at 9 pm.  \n\nThe Wednesday night events with __Juan Villarreal__ have been truly awesome.  He introduces us to all of this amazing new tango music, the vast majority of which I didn&#39;t know before.  And then, he plays us a little, impromptu concert each week.  Many of us can&#39;t help getting up to dance, even though we&#39;re alone. ðŸ™‹ðŸ» All of you who are not there, you really are missing something incredibly lovely.","videoUrl":"","linkText":"Learn more & register...","link":"lecture-series-via-zoom-Wednesdays","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1617661546/April_2021_Lectures.png","localPath":"/images/April_2021_Lectures.png","title":"April_2021_Lectures","width":2000,"height":2000}},{"headline":"Wednesdays, May 12 & 19, 7:30 pm","content":"## The Gracenote and the Slur: A study of tango lyrics with Jake Spatz\n\nThis short lecture series by Jake Spatz is a study of how tango lyrics developed in Argentina during the early Golden Age. Beginning with the birth of the tango canciÃ³n in the late 1910s, weâ€™ll cover the first phase of major songwriters, to see how tangos borrow from each other and together form a kind of street opera chronicling the passions and anxieties of an era.\n\nIn these two lectures, Jake will cover the major songwriters of the 1920s and 1930s.\n\nLecture I. â€œChampagne Tango: The 1920sâ€\n\t* Pascual Contursi, Celedonio Flores, Francisco GarcÃ­a JimÃ©nez\n\nLecture II. â€œSocial Upheaval: The 1930sâ€\n\t* E. S. DiscÃ©polo, Alfredo Le Pera, Enrique CadÃ­camo\n\n[Register now](/registration)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1620086836/Lectures__May_12_19_Copy.png","localPath":"/images/Lectures__May_12_19_Copy.png","title":"Lectures__May_12_19_Copy","width":1080,"height":1080}},{"headline":"Wednesday, May 26","content":"## Somos Tango: Social Political Activism in Contemporary Tango Lyrics\n\nSince 2000 there has been a new boom of tango lyricists and composers crafting and singing new tangos that address the cultural, societal, economic, and political changes occurring throughout Argentina. In this class, we will closely analyze several contemporary tangos to understand some of the recent historical events that have transformed tango into an instrument of activism.  \n\n__Dr. Mary Lourdes Silva__ is an Associate Professor of Writing at Ithaca College. She has both a Ph.D. in Language, Literacy, and Writing Studies and an MFA in Creative Non-fiction. She currently teaches writing courses about Argentine tango as a modality for learning and tango for social justice. In 2019, Mary Lourdes completed her sabbatical in Buenos Aires. She also teaches tango in Ithaca, inspiring more women to lead and more men to follow.\n\n__Juan JosÃ© Ortega__ is an Environmental  Engineer and a Spanish Teacher from Argentina, with a strong passion for tango. His interest in tango music and lyrics started at an early age due to his family. He moved to Buenos Aires for his studies and lived there for 11 years, where he continued to develop his passion for tango and the local folklore. He shares the culture of Buenos Aires to his students through contemporary tango lyrics. When dancing, he highlights the importance of understanding the story being told in the lyrics in order to achieve a more mindful dance.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1621427341/Lecture__May_26_Square.jpg","localPath":"/images/Lecture__May_26_Square.jpg","title":"Lecture__May_26_Square","width":1080,"height":1080}},{"headline":"Sunday, June 27, 3 pm: In-Person Lecture / Demonstration","content":"##  Last night was absolutely amazing.\nThanks to everyone who was there.  We continue today with an in-person lecture/demonstration by Hugo & Winnie on a \"the\" topic for tango social dancers - the characteristics of the four most popular tanog orchestras in history.  Please join us...\n\n__Sunday, June 27__\n__3-4:30 pm:__ In-person Tango Lecture Series event: __\"Exploring the Big Four Orchestras\"__, presented by Hugo Satorre. \n\nThis workshop will delve into the \"big\" tango orchestras, D&#39;Arienzo, Di Sarli, Troilo and Pugliese, to learn about them, recognize each orchestra&#39;s unique style, and find the relationships between the music and the technical and musical possibilities in our dance.","videoUrl":"","linkText":"Learn more & register...","link":"in-studio-weekend-june-26-27-2021","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1623432965/June_26-27_Square.png","localPath":"/images/June_26-27_Square.png","title":"June_26-27_Square","width":1080,"height":1080}},{"headline":"Milonga Qilombo, Concert + Lecture: July 24-25","content":"We are so excited to introduce two dynamic, young musicians to the Philadelphia tango community over the July 24-25 weekend:\n\n__Heyni Solera, bandoneonist\nTeagan Faran, violinist__\n\n__Saturday, July 24__\n__8-9 pm:__ Concert (seated) by Heyni Solera & Teagan Faran\n__9 pm-1 am or later:__ Milonga Qilombo with LIVE MUSIC by Heyni Solera & Teagan Faran, joined by pianist Emiliano Messiez\n\nConcert + Milonga: $25\nConcert + Milonga + Donation: $40\n[REGISTER](/registration)\n\n__Sunday, July 25__\n__5-6:30 pm:__ Lecture by Heyni Solera: \"Today&#39;s Women in Tango: Carving Out Spaces\" (Available in-studio and by streaming)\n__6:30-8 pm:__ Mandatory visit to the beer garden.  Haha, just kidding!  But we&#39;ll be hanging out, if you&#39;d like to join us!\n\nIn-Studio Lecture: $20\nIn-Studio Lecture + Donation: $30\nWatch Online: $15\n[REGISTER](/registration)\n\n__Location:__ Philadelphia Argentine Tango School, 2030 Frankford Ave, Philadelphia, PA 19125\n","videoUrl":"","linkText":"Learn more...","link":"milonga-qilombo-lecture-weekend-Heyni-Solera-Tegan-Faran-July-24-25","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1626882497/7-24-21_Heyni-Teagan_Copy.jpg","localPath":"/images/7-24-21_Heyni-Teagan_Copy.jpg","title":"7-24-21_Heyni-Teagan_Copy","width":1005,"height":1005}}]'>
