        <div id="page-teasers" data-teasers='[{"headline":"Tango Dueling Pianos Concert, Class & Milonga Qilombo","content":"## Saturday, September 10\n\n### [VIEW THE PROGRAM](https://drive.google.com/file/d/1058z2e6Bt6-0EgCedQUUGIEmYMUKK1lt/view?usp=sharing)\n\n__CONCERT & CLASS SOLD OUT!__  Both the concert and the pre-milonga class are sold out.  We will be welcoming additional walk-ins only to the milonga portion of today&#39;s events!\n\nIn conjunction with __Jacobs Music Company__, the preeminent piano dealer in the tristate area, we are honored to present a very special concert:\n\n### TANGO DUELING PIANOS\nPerformed by __Emiliano Messiez__ and __Pablo Estigarribia__\n\nThe concert will take place at Jacobs Music Company in Center City, Philadelphia.  Both pianists will perform on Steinway grand pianos.  This is the first time that the concert will be performed on such extraordinary instruments.  Space is very limited. \n\nAfter the concert, we will move to the Philadelphia Argentine Tango School for a pre-milonga class and milonga.  We are honored to have two of the great teachers and dancers of our time, teaching the pre-milonga class: __Ines Muzzopappa & Carla Marano__.  Our DJ will be __Craig Herrington__ from Cleveland, visiting specially for this event!\n\n[View the press release](https://drive.google.com/file/d/1uyACAMeCvbpd2Bo81QPufOZC4WmewGXj/view?usp=sharing)\n\n### SCHEDULE\n\n__4-5 pm: CONCERT - Tango Dueling Pianos__\nEmiliano Messiez, piano\nPablo Estigarribia, piano\nLocation: Jacobs Music Company, 1718 Chestnut St, Philadelphia, PA 19103\n\n__8:30-9:30 pm: ALL LEVELS TANGO CLASS__\nCarla Marano & Ines Muzzopappa\nLocation: Philadelphia Argentine Tango School, 2030 Frankford Ave, Philadelphia, PA 19125\n\n__9:30 pm-2 am: MILONGA QILOMBO__\nDJ Craig Herrington\nLocation: Philadelphia Argentine Tango School, 2030 Frankford Ave, Philadelphia, PA 19125\n\n__PRICING AT THE DOOR__\n$25 - Milonga Only\n","videoUrl":"","linkText":"","link":"tango-dueling-pianos-messiez-estigarribia","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1660059231/Sept_10_square-1.jpg","localPath":"/images/Sept_10_square-1.jpg","title":"Sept_10_square-1","width":1920,"height":1920}},{"headline":"Emiliano Messiez","content":"Born in Buenos Aires, Argentina, and based in NYC, pianist/composer Emiliano Messiez has become one of the most in-demand tango pianists in the world. He has played some of the most notable music venues in the United States, including Lincoln Center, and performed with some of the worldâ€™s top musicians, such as Paquito de Rivera, Dino Saluzzi, and Concha Buika. With Jose Luis Infantino, he recorded the album, â€œSilencio,â€ in 2004, which received an UNESCO Prize for music.\n\nWith a versatile and unique style, Emiliano performs in a wide range of genres from classical music and jazz, to rock and Latin American rhythms. In the worldwide tango community, Emiliano has become known as one of the most brilliant tango pianists of our time. His playing is absolutely infectious and highly danceable. Whether Emiliano is performing as a soloist, in small group formations (duo / trio / quartet), or directing his entire orchestra, the [Tipica Messiez](https://www.emilianomessiez.com/tipica), you canâ€™t sit down when Emiliano is playing.\n\nEmiliano graduated from the National University of the Arts in Buenos Aires. He later joined the faculty there, teaching in the Department of Composition. He also graduated from Berklee College of Musicâ€™s Escuela de Music ContemporÃ¡nea in Buenos Aires.\n\nEmiliano is the pianist for the hit show, â€œForever Tango,â€ which has been seen by over eight million people worlwide, including on Broadway and the West End in London. He performs â€œTango Dueling Pianos,â€ a unique concept featuring two tango pianists, with Latin-Grammy nominee Pablo Estigarribia.\n\nIn 2020, Emiliano released a new CD with the Underground Tango Ensemble, â€œEl CharrÃºa,â€ a tribute dedicated to his friend, Latin Grammy winner bandoneonist RaÃºl Jaurena.\n\nA prolific composer, Emiliano wrote the music for â€œThe Guava Treeâ€ and â€œBordelloâ€, an in-development musical based in 1920â€™s Buenos Aires. He is currently at work on a new musical for Creede Repertory Theater in Colorado.\n\nFor more information, please visit [www.emilianomessiez.com](https://www.emilianomessiez.com/).","videoUrl":"","linkText":"","link":"emiliano","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1643131228/Emiliano_Messiez_-_square.jpg","localPath":"/images/Emiliano_Messiez_-_square.jpg","title":"Emiliano_Messiez_-_square","width":876,"height":876}},{"headline":"Pablo Estigarribia, pianist","content":"__Pablo Estigarribia__ is a Latin Grammy nominee and world-renowned tango pianist, arranger and composer. Like many artists of this genre, he began his training as a classical musician and soon branched out into the world of tango. He studied at the National Conservatory in Buenos Aires, where he won the Bienal Juvenil National Competition for Young Artists. After graduating, he spent several years on the frenzied performance circuit in Argentina, collaborating with the Congress Chamber Orchestra, the National Radio Orchestra, and the Chaco Symphony, among many others. Seeking to broaden his musical horizons beyond the classical realm, Estigarribia took a brief detour through jazz and then discovered tango in 2005. He quickly won the Orquesta Escuela de Tango scholarship and performed with this superb ensemble under the direction of Maestro Emilio Balcarce. Estigarribia continued working with Balcarce shortly thereafter when he first toured Europe.\n\nEstigarribia rapidly established himself as a nuanced and masterful tango performer in Germany, France, Belgium, Japan, Russia, Finland, Canada, the United States and Cuba. He has been featured in over a thousand concerts, joining Argentine tango legends like Maria GraÃ±a, Victor LavallÃ©n, Leopoldo Federico, Nestor Marconi, Horacio Cabarcos, Emilio Balcarce and many others. Estigarribiaâ€™s album Tangos Para Piano (EPSA) won the prestigious 2015 Gardel Prize for Best Tango Album by a New Artist. After receiving wide acclaim for this album, he earned coveted recognition from the Argentine tango industry as an expert in the art of tango music. He is a recipient of the Argentine Tango Societyâ€™s Medal of Honor for his educational forays at the Stowe Tango Music Festival (Vermont, USA) in multiple years. Estigarribiaâ€™s ascendancy brought him to Japan in 2016 where he was lauded in the Tokyo press following his performances. He then became sought after in the United States, where he played in New Yorkâ€™s famous Blue Note Jazz Club. He has made performance and interview appearances on NBC, Univision, Telemundo, and The Huffington Post.\n\nAfter enjoying the privilege of 13 years of mentorship by legendary Osvaldo Pugliese arranger and bandoneonist Victor LavallÃ©n, Estigarribia is proud to assume the role of teacher and transmitter of the tango tradition. He is delighted to showcase and share the beauty of tango&#39;s rich lineage, and gladly invites both the experienced and uninitiated to study the unique, seductive flair of tango. New generations of students and seasoned enthusiasts alike can advance their technical knowledge with Estigarribiaâ€™s compositions and arrangements. Above all, he seeks to reopen the passage of tango music repertoire to musicians who may not know where to start, so they too can delight in the genre&#39;s legacy. With that goal in mind, Estigarribia published his original compositions and arrangements of traditional pieces, Tangos de Concierto, and teaches, judges, and performs regularly at tango festivals and events all over the world.\n\nEstigarribia splits his time between his native Buenos Aires, Argentina, and New York City.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1636157891/Pablo_E_square_2021.jpg","localPath":"/images/Pablo_E_square_2021.jpg","title":"Pablo_E_square_2021","width":1365,"height":1365}},{"headline":"Carla Marano","content":"Carla belongs to a generation of dancers that helped transform tango from a popular dance form with virtually no pedagogy, into a highly-sophisticated, deeply-understood art form. This was accomplished through many years of penetrating investigation into its movement technique, technical language and musical interpretation. Carla was an essential part of this investigative process, which has fueled the evolution of the dance, and its explosive popularity worldwide.\n\nOver the years, Carla has devised her own didactic method based on her unique approach to the dance, a system which she has been able to share with colleagues from different generations and styles.","videoUrl":"","linkText":"read more...","link":"carla-marano-bio","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1539618638/rdwwmuyc4l7qljkkndes.jpg","localPath":"/images/rdwwmuyc4l7qljkkndes.jpg","title":"rdwwmuyc4l7qljkkndes","width":1080,"height":1080}},{"headline":"Ines Muzzopapa","content":"InÃ©s Muzzopappa is an Argentine Tango dancer and instructor. She started her path in tango when she was 14 years. In 2007 she won the 1st Prize in the World Tango Championship.\n\nFrom that moment on she started to teach and perform at the most renowned Tango Festivals and events in Argentina, Europe, Asia and the US. She also has participated as a judge in different international contests for tango.\n\nDuring these years, InÃ©s has also been studying social pedagogy and English and Italian languages in order to improve her teaching skills and to organize conferences merging tango and pedagogy.\n\nInes is a riveting performer and brilliant teacher who has visited Philadelphia several times before, most recently at the 2022 Philadelphia Tango Festival.  We are very lucky to be able to welcome Ines to Philadelphia twice in one year!","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/w_1000,ar_1:1,c_fill,g_auto,e_art:hokusai/f_auto,q_auto/v1614271205/IMG_9496bb.jpg","localPath":"/images/IMG_9496bb.jpg","title":"IMG_9496bb","width":1200,"height":1920}},{"headline":"Craig Herrington","content":"Craig Herrington is a DJ, dancer, & event organizer based in Cleveland, Ohio. During his tango tenure, he has helped organize calm afternoon milongas, raging all-nighters, & everything in between. Craig primarily learned to DJ (& dance) in Cleveland from the Cleveland Tango School, but he has also studied tango in Philadelphia, Chicago, & New York City. When not in Cleveland, he can be found traveling the Midwest & Northeast to DJ & dance. ","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1660852809/Photo_17_-_Craig_Herrington.jpg","localPath":"/images/Photo_17_-_Craig_Herrington.jpg","title":"Photo_17_-_Craig_Herrington","width":1367,"height":1367}}]'>
