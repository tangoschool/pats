        <!-- Teasers Section -->
        
        <div id="page-teasers" data-teasers='[{"headline":"Ines Muzzopapa","content":"Inés Muzzopappa is an Argentine Tango dancer and instructor. She started her path in tango when she was 14 years. In 2007 she won the 1st Prize in the World Tango Championship.\n\nFrom that moment on she started to teach and perform at the most renowned Tango Festivals and events in Argentina, Europe, Asia and the US. She also has participated as a judge in different international contests for tango.\n\nDuring these years, Inés has also been studying social pedagogy and English and Italian languages in order to improve her teaching skills and to organize conferences merging tango and pedagogy.\n\nInes is a riveting performer and brilliant teacher who has visited Philadelphia several times before, most recently at the 2022 Philadelphia Tango Festival.  We are very lucky to be able to welcome Ines to Philadelphia twice in one year!","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/w_1000,ar_1:1,c_fill,g_auto,e_art:hokusai/f_auto,q_auto/v1614271205/IMG_9496bb.jpg","localPath":"/images/IMG_9496bb.jpg","title":"IMG_9496bb","width":1200,"height":1920}},{"headline":"Winnie Cheung","content":"Convinced of tango’s power to include everyone, pianist Winnie Cheung launched Tango With Winnie to bring live tango dance and music to both classic and unconventional tango corners of the world: concert halls, milongas, art galleries, farmers markets, K-12 schools, universities, dementia homes, assisted living spaces, prisons, town-wide multicultural celebrations, and more.  Tango has deep magic:  it reawakens memories of the body and of the mind; it tolerates differences; it shares cultures.  With veteran artists that Winnie brings from all over the world, Tango with Winnie handcrafts each program towards any imaginable objective of your event, and invites you sincerely to tango, whoever you are, wherever you are.   \n\nWinnie has played over 300 tango events in the USA, Canada, Asia, Argentina, even Antarctica. Her album with Cuarteto Tanguero, Guapeando, charted Top 10 Billboard World Music in 2018. Her newest album with the duo Ben & Winnie, La Próxima Traición, was released in 2020 with glowing reviews.  \n\nOriginally from Hong Kong, Winnie is a globetrotting pianist holding a Bachelor’s Degree from the University of Chicago and Masters and Doctorate from the Eastman School of Music in Piano and Music Composition. She taught classes in music composition, theory, piano, choir, and music appreciation from ages 5 to 95 in Canada/USA until tango found her.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1678729124/WhatsApp_Image_2023-03-13_at_12.05.22_PM.jpg","localPath":"/images/WhatsApp_Image_2023-03-13_at_12.05.22_PM.jpg","title":"WhatsApp_Image_2023-03-13_at_12.05.22_PM","width":1750,"height":1750}},{"headline":"Christine Brebes","content":"Christine Brebes followed her passion down to Buenos Aires in 2002, where she moved to learn playing different tango orchestra styles alongside the living masters in La Orquesta Escuela de Tango de Emilio Balcarce. She has dedicated her life to performing and teaching, and has traveled with tango shows such as Tango X2, Tango Dreams, Tango Fire, and Tango Lovers to play in many beautiful and historic theatres around the world such as Japan, Italy, England, China, Colombia, Peru, Uruguay, Chile, and the US. \n\nChristine was introduced to Astor Piazzolla’s music in 1998 while playing with Beau Bledsoe in Duo Lorca. She visited Buenos Aires in 1999 and knew that she had to live there. Their duo expanded to form Tango Lorca in Nov. 1999 with the guidance of Daniel Diaz, an argentine bandoneonist living in Salt Lake City. She started to travel with him around the US and met Fernanda Ghi in Denver, CO at The Mercury Cafe milonga in 2000. This reunion came around full circle when she was invited to be the violinist in her show Tango Dreams in Tokyo, Japan in 2003. Twenty years later, a celebration of Women in Tango is bringing them together again, and this is just the beginning.\n\n*To hear a bit more about Christine’s life, she was filmed for an argentine public television series in 2009 (subs in english) about the role of immigrants in tango:\n\n[https://www.youtube.com/watch?v=ZwtWlOS3Xkk&list=PLPEiVBmPm5dEKc-JxazaeDYyi-7igh4oJ&index=104&t=245s](https://www.youtube.com/watch?v=ZwtWlOS3Xkk&list=PLPEiVBmPm5dEKc-JxazaeDYyi-7igh4oJ&index=104&t=245s)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1678729297/Christine2.jpg","localPath":"/images/Christine2.jpg","title":"Christine2","width":512,"height":720}}]'>
