        <div id="page-teasers" data-teasers='[{"headline":"Social Distancing Date Night: Beginner Tango Online","content":"If you are lucky enough to be sheltered in place with a partner, try out the Philadelphia Argentine Tango School&#39;s online beginner tango classes.  Absolutely no experience required.\n\nEvery Friday 7-8 pm, until we can dance together in person again\n\nTaught by [Andres](/andres) & [Meredith](/meredith), founders of the Philadelphia Argentine Tango School.\n\nSingle class: $10\n5 online classes: $45\n10 online classes: $80\n\nPlease [register in advance](https://secure.yogareg.com/philadelphiatango/pub?action=shopOfferingsByDate&offerTypeFilter=Drop%20In%20Class,Workshop) so we can get you the zoom link to tune in.  ","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1585942719/qsunzvbpso2gjwe0n98m.jpg","localPath":"/images/qsunzvbpso2gjwe0n98m.jpg","title":"qsunzvbpso2gjwe0n98m","width":1080,"height":1080}},{"headline":"Our Curriculum","content":"Curriculum Classes\nBeginner Tango - Level 1\n\nThursdays, 7-8 pm\n$10 drop-in | $70 for 8-class card\nTaught by: Kristin\n\nAt this level, we focus on:\n* Improvisation with simple steps\n* Familiarity with the basic step as a “road map” for dancing tango\n* Basic technique for balancing, walking, ochos and other simple steps\n* An introduction to lead & follow\n* An introduction to tango music & musicality\n* An introduction to navigating the social dance floor","videoUrl":"","linkText":"read more...","link":"curriculum","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1539618638/dma7fezsbmfbyguqosjc.jpg","localPath":"/images/dma7fezsbmfbyguqosjc.jpg","title":"dma7fezsbmfbyguqosjc","width":1080,"height":1080}},{"headline":"Classes & Workshops","content":"We&#39;ve designed our curriculum in order to move students comfortably through each level from first-timer to advanced dancer.  Our classes for newer dancers (beginner and advanced beginner levels) are taught by a single in-house teacher, Kristin Balmer, so that students get the most unified and easy-to-understand introduction possible.  \n\nAs students move on to intermediate and advanced levels, they benefit from studying with a variety of in-house and guest instructors.  Over time, this diversity gives students exposure to many different ways of doing things, and many different ways of \"thinking\" tango.  This is just one of the sometimes-frustrating truths of tango: there are many right ways to do the same thing.\n\nMost of our [curriculum](/curriculum) takes place in weekly classes.  Extra [seminars](/workshops) are added on the weekends (and sometimes during the week as well) to cover special topics in-depth.  The level of each special seminar is always announced so that students can understand how it fits into our curriculum.","videoUrl":"","linkText":"see specific classes & curriculum...","link":"curriculum","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1539618638/f28yvb5y3qzzrx3jjmhl.jpg","localPath":"/images/f28yvb5y3qzzrx3jjmhl.jpg","title":"f28yvb5y3qzzrx3jjmhl","width":1080,"height":1080}},{"headline":"","content":"PATS Director Meredith Klein hosts **Tango Stories** on [USALA Radio](http://www.usalamedia.com).  The show gives you glimpses into the lives of the social dancers, teachers, performers, musicians, DJs, and organizers who take part in the global phenomenon that is Argentine tango. In addition to great interviews, the show offers you the chance to listen to a lot of beautiful tango music.\n\nTango Stories airs on USALA every Wednesday from 5-6 pm.  \n\n### [LISTEN LIVE](http://www.usalamedia.com)","videoUrl":"","linkText":"Past episodes available online here...","link":"tango-stories","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1539618638/o3bm16txo8v22u2trszu.jpg","localPath":"/images/o3bm16txo8v22u2t
