"width":1080,"height":1080}},{"headline":"Rent Cafe Blog Says TANGO is Why You Should Move to Fishtown!","content":"Thanks so much to Rent Cafe Magazine for including PATS in their article about why you should consider moving to Fishtown!  [Read the article here](https://www.rentcafe.com/blog/apartment-search-2/neighborhood-guides/fishtown-philadelphias-hottest-neighborhood/).\n\nAnd guess what?  You can not only live in Fishtown, but actually live above a tango studio!  We are in the process of preparing the beautiful bilevel apartment above the tango studio for rent by October 15 or November 1.  Please contact Meredith at 617-291-3798, if you&#39;d like to schedule a tour when it&#39;s ready!\n\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1600175707/w9xdrymqdzz1fg1vs5td.jpg","localPath":"/images/w9xdrymqdzz1fg1vs5td.jpg","title":"w9xdrymqdzz1fg1vs5td","width":1080,"height":1080}},{"headline":"PHL-17 Visits PATS","content":"In August 2020, PHL-17&#39;s Khiree Stewart visited PATS to learn about our efforts to keep tango alive through the pandemic.  \n\nThe piece features interviews with Andres & Meredith, footage from an online class, and video of us dancing to gorgeous new music written for the Philly tango community by Leandro Ragusa and Emiliano Messiez.\n\n[Check it out!](https://phl17.com/web-exclusives/philadelphia-argentine-tango-school-goes-virtual/?fbclid=IwAR0cPjTL5kXyuWHEPhoZavLwTQFe8MIlDNziAQAB_8VP99G-QwrmV4rGE2s)","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1599841434/ahazm1ujdixmw2dxhvol.jpg","localPath":"/images/ahazm1ujdixmw2dxhvol.jpg","title":"ahazm1ujdixmw2dxhvol","width":1080,"height":1080}},{"headline":"Un Tango Para Philly","content":"[Emiliano Messiez](https://www.emilianomessiez.com/) and [Leandro Ragusa](https://www.leandroragusa.com/) composed [this tango](https://youtu.be/ZX91Vgz3ZvA
