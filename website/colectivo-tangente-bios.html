        <div id="page-teasers" data-teasers='[{"headline":"Leandro Ragusa, bandoneonist","content":"Leandro Ragusa studied bandoneón with the Mtros. Néstor Marconi, Carlos Lazzari and Juan Carlos Caviello and composition & arrangements with Mtros. Gabriel Senanes, Laura Baade, Manolo Juarez an Diego Taranto.  Leandro was awarded a scholarship by the Konex Foundation and completed the First Higher Diploma in Tango, graduating in 2004. He teaches in Tango history at the University of Tango in Buenos Aires.  He is a co-founder of Centro’feca (Forum of Argentine Cultural Studies), an NGO dedicated to the research and dissemination of Tango.\n\nLeandro has been part of various tango orchestras: Juan D’arienzo Orchestra, Rodolfo Mederos Orquesta, Orchestra Escuela de Tango. As a soloist he participated in the Tango show of the Huis Ten Bosh Center (Nagasaki-Japan), National Radio Youth Orchestra, the Orcheste Symphonique de Longueuil (Montreal - Canada) and the Symphony Orchestra of the Municipality of San Martín (Buenos Aires).  Since 2016, he has made arrangements for different ensembles in the Argentina and abroad.\n\nHe currently performs as a bandoneonist, composer and arranger of ”˜Quinteto de Academia’, music for woodwinds and bandoneon, with which he has performed in New York, Boston and Montreal, as well as in Buenos Aires.  In September 2019, WRTI Philadelphia filmed this beautiful [concert/profile](https://www.wrti.org/post/wrti-901-performance-studio-tango-music-1918-present) of Leandro Ragusa and Emiliano Messiez.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto,q_auto/v1588268679/gkftwgee5rqyohizra3a.jpg","localPath":"/images/gkftwgee5rqyohizra3a.jpg","title":"gkftwgee5rqyohizra3a","width":1080,"height":1080}},{"headline":"Pablo Lanouguere, bassist","content":"Born in Buenos Aires, Argentina, Pablo Lanouguere is an active musician and composer based out in New York City. As a sought after musician, he regularly plays with renowned artists and bands of Tango, Jazz, Latin-Jazz, Swing, Salsa, Classical and World Music. He has played at some of the most important venues in NYC such as Carnegie Hall, Lincoln Center, The National Sawdust, Zinc Bar, Bryant Park Music Festival, SOB&#39;S, Rockwood Music Hall, The Bitter End, The Django, among others.\n\nOver the past few years, Mr. Lanouguere has collaborated with artists such as Raul Jaurena, Fernando Otero, Daniel Binelli & Astoria Tango Orchestra, Adam Tully, Emilio Solla, Emiliano Messiez and Federico Diaz. Additionally, he has also toured around the US with several American & Argentine bands.\n\nSince 2016 he is founding member of Abaddon, a traditional Tango Sextet based in New York City. Since 2019, he leads the \"Pablo Lanouguere Quintet\" group which he released his first album as a bandleader, called \"Eclectico\" (Piano Piano Records).\n\nHe has been also part of theater productions including Five Senses (Tango Show, 2015, Thalia Spanish Theater), Macbeth (Shakespeare Play, 2015, Fox Wolf Production), Afrotango (Musical, 2016, Thalia Spanish Theater) and Tangomenaje (Tango Show, 2017, Thalia Spanish Theater), Tango + Tango (Tango Show, 2018, Thalia Spanish Theater), Cinderella Tanguera (2019, Teatro SEA).\n\nHe has studied with Nestor Ibarra (Harmony and Composition), Mariano Otero, Gustavo Giles, Guillermo Delgado, Alejandro Herrera (Electric Bass), Daniel Falasca and Pedro Giraudo (Double Bass) In addition to it, he holds Degree in Jazz Music from the Escuela de Musica Popular de Avellaneda in Buenos Aires, Argentina.\n","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1633465127/Pablo.jpg","localPath":"/images/Pablo.jpg","title":"Pablo","width":2000,"height":2000}},{"headline":"Sergio Reyes, violinist","content":"Sergio R. Reyes Mendoza (Guatemala City, 1974) is a violinist, composer, arranger, and educator, residing in New York City for over two decades.\n\nPassionate about the arts, literature, and Guatemalan History, he draws inspiration on events and challenges from Guatemalan and Latin American contemporary societies for his original orchestral and chamber music compositions.\n\nAfter years of academic music training, he has become a versatile performer who treasures the many musical traditions from throughout Latin America, considering them key factors to raise awareness of culture, education, environment, and identity within new generations.\n\nDuring his extensive career path in New York City, since 1993, he has performed in Carnegie Hall, Lincoln Center, MoMA, The Metropolitan Museum of Art, and the Blue Note Jazz Club, amongst others. He has shared the stage with internationally renowned artists such as Frederica von Stade (soprano), Clive Lythgoe (pianist), Danny Rivera (song-writer, activist) and Argentine musicians who worked with tango master Astor Piazzolla, such as Pablo Ziegler (piano), Héctor Del Curto (bandoneon), Raúl Jaurena (bandoneon), and Daniel Binelli (bandoneon), amongst others.\n\nMr. Reyes studied violin and composition at Interlochen Arts Academy, Manhattan School of Music, and Brooklyn College. In Europe, he attended the Mozart European Academy (Poland) and the Ecoles d’Arts Américaines (Fontainebleau, France).\n\nIn 1998 and 2018 he was awarded 1st Prize in the Certamen Permanente Centroamericano ’15 de septiembre’ with compositions La Chamusca and A las poetas de este tiempo, respectively.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1647096267/71082193_521220841968470_6915894616491294720_n.jpg","localPath":"/images/71082193_521220841968470_6915894616491294720_n.jpg","title":"71082193_521220841968470_6915894616491294720_n","width":715,"height":564}},{"headline":"Fede Diaz","content":"Born in Mendoza, Argentina, Federico Díaz is an up-and-coming versatile musician of the new generation of guitarists with a multi-faceted career as a performing artist, arranger and composer in the Classical and Argentinian music worlds. His performances have taken him to distinguished festivals and concert halls across the US, Europe and Latin America. His passion for chamber music lead him to collaborate with musicians such as Lionel Cottet, Daniel Binelli, Juan Falú, Bruno Cavallaro, Juan Pablo Navarro, among others. He has recorded for Sony Classical and Epsa Music. Federico studied at prestigious institutions such as National University of Cuyo, University Mozarteum Salzburg, Hochschule für Musik Hanns Eisler, and Manhattan School of Music. His former teachers include Eliot Fisk, Ricardo Gallén and David Starobin. Currently, he is finishing a DoctorÂ´s Degree in Performance, at the GraduateCenter of City University of New York, under the guidance of Frederic Hand.","videoUrl":"","linkText":"","link":"","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1649017187/Federico_Diaz_2_square.jpg","localPath":"/images/Federico_Diaz_2_square.jpg","title":"Federico_Diaz_2_square","width":1000,"height":1000}},{"headline":"Emilio Teubal, pianist","content":"Emilio Teubal is a pianist/ composer/arranger from Argentina based in New York. He has recorded over twenty albums, both as a sideman and as a composer/bandleader including the 2018 Latin Grammy Winner album “Vigor Tanguero” by the Pedro Giraudo Group. His latest solo record, “Tides”, is a compilation of improvised and composed pieces for solo piano that has been released by New Focus Recordings and distributed by Naxos.   \n\nA prolific composer and arranger, Emilio identifies his artistry and creative search to the music of Latin America and the permanent elasticity of stylistic limits. Prior to the Solo Piano record “Tides”, he has released four albums:“Memorias de Otro Tiempo” (2018) written for the Emilio Teubal Trio (featuring Federico Diaz on guitar and Ivan Barenboim on clarinet) which has been included on the shortlist “Best Jazz of the month on Bandcamp” on February 2018. In the fall of that same year, the Trio did an extensive album release tour in Japan. Prior to this album, he released “Música Para Un Dragon Dormido” (Music for a sleeping Dragon) (2013) under the independent label Brooklyn Jazz Underground, which has been chosen as the best jazz album of 2013 by several specialized media. The album received worldwide press recognition with rave reviews: “”¦ As near to perfection as you can get” (Dave Sumner, Bird is The Worn). The album features some of Teubal’s longtime collaborators, Moto Fukushima, Sam Sadigursky, and John Hadfield, plus special guests Erik Friedlander and Satoshi Takeishi. His first two albums are\"La Balteuband\" (2006), and \"Un Monton de Notas\" (2009) which features \"El Amanecido\" a song that has been featured in the movie Meet The Patels \n\nA versatile Pianist who can navigate through different styles of written and improvised music, Emilio has performed in some of the most prestigious venues and theaters in the United States such as The Lincoln Center, The Kennedy Center, Brooklyn Academy of Music, Symphony Space, The Blue Note, Birdland, Le Poisson Rouge, and Joes Pub. He has also extensively toured around the world, including recitals in Japan, Qatar, Spain, Guatemala, Canada, Mexico, and Argentina. He has also been an essential member of the Tango, Latin, and Jazz scene of New York performing and recording with the Pedro Giraudo Quartet (2018 Latin Grammy winner), Marta Gomez, Adam Tully Trio,Pablo Lanouguere Quintet, Colectivo Tangente, Sergio Reyes’s Romancero Latinoamericano, Los Chantas tango group, Sam Sadigursky, Erik Friedlander and Satoshi Takeishi to name a few.  \n\nEmilio is a recipient of the 2007 Meet The Composer’s prestigious Van Lier Fellowship, which provides support for talented, culturally diverse young people who are seriously dedicated to a career in the arts. He has also been commissioned to write music for various settings: In 2017 he was commissioned by Saint Peters Church to compose a piece titled Unity for more than 40 instrumentalists and singers to commemorate the 500 anniversary of the Lutheran reform. He has also been commissioned to write a solo piece for the virtuoso guitarist Dan Lippel,  and a piece for the Adam Tully Tango trio. Recently he was asked to write a piece for the Japanese experimental contemporary group “Music KART” which will be recorded in the Fall of 2020.","videoUrl":"","linkText":"Return to Event Description","link":"in-person-events","image":{"url":"https://res.cloudinary.com/philly-tango/image/upload/f_auto/q_auto/v1647096801/Emilio-square.jpg","localPath":"/images/Emilio-square.jpg","title":"Emilio-square","width":708,"height":708}}]'>
